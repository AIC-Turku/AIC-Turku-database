reason_details: Annual preventive maintenance visit for the Zeiss LSM 880 / Axio Observer
  7. The visit was triggered by the routine vendor PM schedule and included follow-up
  on reported stage movement irregularities and reduced argon laser performance.
action: service
action_details: Vendor preventive maintenance was performed according to the Zeiss
  protocol. Checks passed for environment, cabling, system startup, anti-vibration
  table, air filters, surge protectors, ECU voltages, electrical and laser safety,
  PC ventilation, microscope general function, liquid-cooling related items, detector/calibration
  routines, beam profile, AOTF, scan field, pinhole/MBS, and Airyscan alignment. MBS
  filter wheel axles were cleaned and lubricated. Maincontroller battery was checked
  at 3.03 V and not replaced. Manual stage control and tile-scan test were completed,
  but stage motion was reported as occasionally not smooth. The argon laser output
  was low and the engineer documented it as end of life, so some maintenance tasks
  including the SNR test could not be completed and were deferred until after argon
  laser replacement.
microscope_status_after: limited
status_notes: Usable, but limited by end-of-life argon output and occasional stage
  movement hiccups.
