notes: 'Timeline anchored to the field service report completion date (2025-04-02).
  The signed maintenance checklist header shows 2025-03-24, so the repository timestamp
  was normalized to 2025-04-02T12:00:00Z because the source documents do not provide
  an authoritative visit start time. Final remarks state that the instrument is not
  fully operational: argon lines 488/514 are low and out of spec, and the stage may
  have a mechanical issue. Additional documented context: ZEN 2.3 SP1 FP3 HF 29 FP3,
  CanCheck 13.0.19.1, RT PC MICO HS, user PC RAM 192 GB, Windows 7 64-bit. Recommended
  follow-up: Replace the argon laser, then repeat the pending maintenance tasks and
  detector SNR test. Review stage mechanics with PI and decide between service/maintenance
  by PI or replacement with a new stage.'
