reason_details: 'Service visit initiated to investigate reported dual-camera acquisition issues and
  possible dust contamination in the Crest V3 spinning disk unit.

  '
action: service
action_details: 'Completed a full system computer check, cleaning, and update; verified USB ports and
  NIS dongle operation and installed an additional PCI-Express card to connect the
  dongle directly due to configuration/power-save behavior. Confirmed NIS software
  configuration. Troubleshot dual-camera acquisition and resolved issues by checking
  cables, configuration, and hardware; validated operation in single- and dual-camera
  modes with customer testing. Inspected and removed the Crest V3 spinning disk for
  internal contamination assessment, then performed full re-installation. Performed
  illumination alignment, focus adjustment, image position alignment, and dual-camera
  calibration/alignment. Cleaned main dichroic mirror, excitation/emission filters,
  and inspected/cleaned beam splitters. Cleaned spinning disk box in clean chamber.
  Verified image quality in live mode across all filter/DM/beam-splitter combinations,
  with and without disk; full field of view confirmed clean. Set Köhler illumination
  on D-LEDI and Ti2 microscope and cleaned 40x objective. Advised customer to use
  lens tissue paper for routine optics cleaning.

  '
