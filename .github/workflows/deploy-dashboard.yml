name: Deploy Dashboard
on:
  push:
    branches: ["main", "master"]
    paths:
      - "docs/**"
      - "instruments/**"
      - "qc/**"
      - "maintenance/**"
      - "scripts/**"
      - "assets/**"
      - "templates/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/deploy-dashboard.yml"
  workflow_dispatch:

permissions:
  contents: read      # Allows checkout of the repo
  pages: write        # Required to deploy to Pages
  id-token: write     # Required to verify the deployment

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies for WeasyPrint
        run: sudo apt-get update && sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libpangocairo-1.0-0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          # FIXED: Tell the caching action to use our custom requirements file name
          cache-dependency-path: "requirements-docs.txt" 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt

      - name: Run dashboard builder
        run: python scripts/dashboard_builder.py
        env:
          MKDOCS_SITE_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

      - name: Generate Audit PDFs
        run: python scripts/generate_audit_pdfs.py

      - name: Upload audit report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: microscope-audit-reports
          path: audit_reports/
          retention-days: 30

      - name: Build MkDocs
        run: mkdocs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "site/"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
