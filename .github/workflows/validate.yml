name: Validate Dashboard Content

on:
  pull_request:
    paths:
      - "docs/**"
      - "instruments/**"
      - "qc/**"
      - "maintenance/**"
      - "scripts/**"
      - "assets/**"
      - "templates/**"
      - "requirements-docs.txt"
      - ".github/workflows/validate.yml"
      - ".github/workflows/deploy-dashboard.yml"
  workflow_dispatch:

permissions:
  contents: read


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install system dependencies for WeasyPrint
        run: sudo apt-get update && sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libpangocairo-1.0-0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: "requirements-docs.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt

      - name: Validate YAML/schema/cross-references/naming
        run: python scripts/validate.py

      - name: Run dashboard builder (strict)
        run: python scripts/dashboard_builder.py --strict

      - name: Generate Audit PDFs
        run: python scripts/generate_audit_pdfs.py

      - name: Upload audit report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: microscope-audit-reports
          path: audit_reports/
          retention-days: 30

      - name: Build MkDocs (strict)
        run: mkdocs build --strict
