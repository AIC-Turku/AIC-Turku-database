name: Validate Dashboard Content

on:
  pull_request:
    paths:
      - "schema/**"
      - "docs/**"
      - "instruments/**"
      - "qc/**"
      - "maintenance/**"
      - "scripts/**"
      - "assets/**"
      - "templates/**"
      - "requirements-docs.txt"
      - ".github/workflows/validate.yml"
      - ".github/workflows/deploy-dashboard.yml"
  workflow_dispatch:

permissions:
  contents: read


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install system dependencies for WeasyPrint
        run: sudo apt-get update && sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libpangocairo-1.0-0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: "requirements-docs.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt

      - name: Check generated templates are up to date
        run: python -m scripts.generate_templates --check

      - name: Validate YAML/schema/cross-references/naming
        run: python -m scripts.validate

      - name: Run contract invariants test suite
        run: |
          PYTHONPATH=. python -m pytest -q \
            tests/test_contract_invariants.py \
            tests/test_virtual_microscope_runtime.py \
            tests/test_light_path_parser.py \
            tests/test_dashboard_builder_sted_dto.py \
            tests/test_schema_generator_validator_contract.py \
            tests/test_generate_templates.py \
            tests/test_validate_instrument_policy.py \
            tests/test_methods_generator_template.py

      - name: Run dashboard builder (strict)
        run: python -m scripts.dashboard_builder --strict

      - name: Generate Audit PDFs
        run: python -m scripts.generate_audit_pdfs

      - name: Upload audit report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: microscope-audit-reports
          path: audit_reports/
          retention-days: 30

      - name: Build MkDocs (strict)
        run: mkdocs build --strict
