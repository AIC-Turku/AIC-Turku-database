name: Auto-fix YAML Vocabularies

# This action can be triggered manually, or run automatically every Sunday at midnight
on:
  workflow_dispatch: 
  schedule:
    - cron: '0 0 * * 0' 

# These permissions are required for GitHub Actions to create a new branch and PR
permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: "requirements-docs.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt

      - name: Run autofix script
        # Notice there is NO --check flag here. We want it to modify the files.
        run: python scripts/autofix_yaml.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: auto-fix legacy schema fields and vocabulary synonyms"
          title: "✨ chore: Auto-fix YAML Vocabularies and Legacy Fields"
          body: |
            This is an automated PR generated by the `autofix_yaml.py` script.
            
            It updates legacy field names and standardizes vocabulary synonyms to their canonical IDs across Instruments, QC, and Maintenance ledgers.
          branch: "bot/auto-fix-yaml"
          base: "main" # Change this if your default branch is 'master'
          labels: "automated pr, data-migration"
