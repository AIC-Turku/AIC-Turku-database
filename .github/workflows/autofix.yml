name: Auto-fix YAML and Regenerate Templates

# This action can be triggered manually, or run automatically every Sunday at midnight
on:
  workflow_dispatch: 
  schedule:
    - cron: '0 0 * * 0' 

# These permissions are required for GitHub Actions to create a new branch and PR
permissions:
  contents: write
  pull-requests: write


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: "requirements-docs.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt

      - name: Run autofix script
        # Notice there is NO --check flag here. We want it to modify the files.
        run: python scripts/autofix_yaml.py

      - name: Regenerate schema-derived templates
        run: python -m scripts.generate_templates

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: auto-fix YAML and regenerate templates"
          title: "✨ chore: Auto-fix YAML and Regenerate Templates"
          body: |
            This is an automated PR generated by the maintenance workflows.
            
            It updates legacy field names, standardizes vocabulary synonyms to their canonical IDs across Instruments, QC, and Maintenance ledgers, and regenerates schema-derived repository templates.
          branch: "bot/auto-fix-yaml"
          base: "main" # Change this if your default branch is 'master'
          labels: "automated pr, data-migration"
