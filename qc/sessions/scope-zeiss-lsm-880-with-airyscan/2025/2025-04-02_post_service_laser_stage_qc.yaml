microscope: scope-zeiss-lsm-880-with-airyscan
started_utc: '2025-04-02T12:00:00Z'
performed_by: Zeiss
reason: post_service_preventive_maintenance
summary: Vendor PM QC documented end-of-life argon performance, low objective-plane
  power for the argon lines, stage tile-scan error within spec, and detector SNR testing
  deferred until argon replacement.
notes: Laser power checks in the signed checklist were marked not in order. Argon
  ex-fiber measurement reached 12.54 mW at max with 8.27 A tube current, but the engineer
  noted the argon laser was at end of life and could not complete all tasks. Objective-plane
  values were recorded at 100% output in spot scan. Detector SNR testing was deferred
  because 488 nm power was under spec. Manual stage control passed and the 3x3 tile
  scan had total error 4 px (<6 px), but the service report also notes occasional
  non-smooth stage movement / hiccups. 
performed:
- qc_type: laser_power
  details: Single-point laser power checks transcribed from the vendor preventive-maintenance
    checklist. Objective-plane values are structured below; ex-fiber values are preserved
    in manual inputs and notes.
  artifacts:
  - art_service_report_pdf
  - art_maintenance_checklist_pdf
- qc_type: stage
  details: Manual XY stage function check and 3x3 tile-scan position error test (TileScanRotation.lvb,
    512 px frame).
  artifacts:
  - art_maintenance_checklist_pdf
- qc_type: alignment
  details: Preventive-maintenance calibration checks passed for detector response,
    spectral calibration, beam profile, AOTF/laser power linearization, scan field,
    pinhole/MBS, and Airyscan alignment.
  artifacts:
  - art_maintenance_checklist_pdf
