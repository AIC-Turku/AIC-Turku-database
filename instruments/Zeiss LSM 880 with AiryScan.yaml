  - name: incubation
    notes: Environmental chamber with temperature control and heated stage inserts
    url: ''
  - name: hardware_autofocus
    notes: Zeiss Definite Focus (focus stabilization)
    url: ''
  - name: piezo_z_stage
    notes: Piezo Z-stage
    url: ''
  - name: workstation
    notes: Image processing workstation (36 TB, 4 GB GPU)
    url: ''

