instrument:
  display_name: Zeiss LSM 880 with AiryScan
  instrument_id: scope-zeiss-lsm-880-with-airyscan
  manufacturer: Zeiss
  model: LSM 880 with AiryScan
  year_of_purchase: ''
  funding: ''
  stand_orientation: inverted
  ocular_availability: trinocular
  location: BioCity, 5th floor, room 5149
  notes: 'State-of-the-art inverted confocal laser-scanning microscope supporting
    standard confocal and super-resolution AiryScan imaging. Dedicated for fast and
    sensitive live-cell imaging with a full incubation chamber. Imaging modes: Confocal
    scanning (spectral detection), Super-resolution AiryScan mode, Fast live-cell
    imaging (resonant scan), Multiplex mode (AiryScan Fast). Reservation system: Zeiss
    LSMM880 with AiryScan. Fluorophore selection guide available for users.'
  url: ''

modalities:
- confocal_point
- ism
- spectral_imaging
- transmitted_brightfield

