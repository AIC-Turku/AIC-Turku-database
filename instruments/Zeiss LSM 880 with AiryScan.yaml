  optical_path_elements:
  - name: AiryScan Emission Wheel
    stage_role: emission
    id: airyscan_emission_wheel
    element_type: filter_wheel   # CORRECTED: Converted hardware.filters into canonical wheel
    modalities:
    - ism
    positions:
      Pos_1:
        name: AiryScan BP 420-488 + BP 495-550
        component_type: multiband_bandpass
        bands:
        - center_nm: 454
          width_nm: 68
        - center_nm: 522.5
          width_nm: 55
      Pos_2:
        name: AiryScan BP 465-505 + LP 525
        component_type: multiband_bandpass   # Note: Modeling a mixed BP/LP setup is complex; using multiband logic
        bands:
        - center_nm: 485
          width_nm: 40
        cut_on_nm:
        - 525
      Pos_3:
        name: AiryScan BP 420-488 + LP 555
        component_type: multiband_bandpass
        bands:
        - center_nm: 454
          width_nm: 68
        cut_on_nm:
        - 555
      Pos_4:
        name: AiryScan BP 495-550 + LP 570
        component_type: multiband_bandpass
        bands:
        - center_nm: 522.5
          width_nm: 55
        cut_on_nm:
        - 570
      Pos_5:
        name: AiryScan BP 555-620 + LP 645
        component_type: multiband_bandpass
        bands:
        - center_nm: 587.5
          width_nm: 65
        cut_on_nm:
        - 645
      Pos_6:
        name: AiryScan BP 570-620 + LP 645
        component_type: multiband_bandpass
        bands:
        - center_nm: 595
          width_nm: 50
        cut_on_nm:
        - 645

  - name: Trinocular Port   # ADDED: Splitting logic for ocular paths
    stage_role: splitter
    id: trinocular_port
    element_type: splitter
    selection_mode: exclusive
    modalities:
    - confocal_point
    - ism
    - transmitted_brightfield
    supported_branch_modes:
    - selected
    supported_branch_count: 2

  # CORRECTED: Removed deprecated hardware.endpoints block.

light_paths:
- id: confocal_point   # CORRECTED: Aligned ID with standard modalities
  name: Confocal Scanning
  modalities:
  - confocal_point
  - spectral_imaging
  illumination_sequence:
  - source_id: 405_nm_diode
  - source_id: 458_nm_argon
  - source_id: 488_nm_argon
  - source_id: 514_nm_argon
  - source_id: 543_nm_hene
  - source_id: 633_nm_hene
  detection_sequence:
  - optical_path_element_id: trinocular_port
  - branches:     # ADDED: Required detection routing to endpoints
      selection_mode: exclusive
      items:
      - branch_id: to_ch1
        label: "To PMT Ch1"
        sequence:
        - endpoint_id: detector_1
      - branch_id: to_ch2
        label: "To Cooled PMT Ch2"
        sequence:
        - endpoint_id: detector_2
      - branch_id: to_eyepieces
        label: "To Eyepieces"
        sequence:
        - endpoint_id: eyepieces

- id: ism
  name: Super-resolution AiryScan
  modalities:
  - ism
  illumination_sequence:
  - source_id: 405_nm_diode
  - source_id: 458_nm_argon
  - source_id: 488_nm_argon
  - source_id: 514_nm_argon
  - source_id: 543_nm_hene
  - source_id: 633_nm_hene
  detection_sequence:
  - optical_path_element_id: airyscan_emission_wheel
  - optical_path_element_id: trinocular_port
  - branches:
      selection_mode: exclusive
      items:
      - branch_id: to_airyscan
        label: "To AiryScan Detector"
        sequence:
        - endpoint_id: detector_5
      - branch_id: to_eyepieces
        label: "To Eyepieces"
        sequence:
        - endpoint_id: eyepieces
  readouts:
  - spectral_imaging
capabilities:
  imaging_modes:
  - confocal_point
  - ism
  contrast_methods:
  - transmitted_brightfield
  readouts:
  - spectral_imaging
  workflows: []
  assay_operations: []
  non_optical: []
