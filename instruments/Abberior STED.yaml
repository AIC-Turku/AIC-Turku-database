    url: ''
    id: detector_1
  - kind: apd
    manufacturer: Excelitas Technologies
    model: SPCM-AQRH-14-TR
    supports_time_gating: true
    default_gating_delay_ns: 1.0
    default_gate_width_ns: 7.0
    notes: Two APD detectors; timing resolution optimized for time-gated CW-STED.
    url: ''
    id: detector_2
  - kind: ccd
    manufacturer: Generic
    model: Monochrome CCD camera
    pixel_pitch_um: 4.65
    sensor_format_px: 1280 x 960
    notes: 1/2-inch format camera.
    url: ''
    id: detector_3
  objectives:
  - id: 20x_air
    manufacturer: Olympus
    model: LMPlanFL N 20x/0.40
    product_code: 1-U2N345
    magnification: 20.0
    numerical_aperture: 0.4
    working_distance: 12.0 mm
    immersion: air
    correction: plan_fluorite
