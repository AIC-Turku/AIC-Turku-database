instrument:
  display_name: Abberior STED
  instrument_id: scope-1e33f909
  manufacturer: Abberior
  model: STED/RESOLFT
  year_of_purchase: ''
  funding: ''
  stand_orientation: other
  ocular_availability: trinocular
  location: BioCity, 5th floor, BioPhysics room 5086
  notes: "Abberior STED. Sophisticated and highly flexible open platform that can be modified, extended, and upgraded. Typical resolution is ~40 nm in XY and ~150 nm in Z using Easy3D STED. Easy3D uses a programmable spatial light modulator (SLM) to create 2D/3D STED phase patterns. Easy3D with adaptive optics enables deep imaging up to 75 \xB5m into cleared tissue with a 100x oil objective. RESCue STED is available for live super-resolution imaging with reduced light dose."
  url: ''

modalities:
  - sted
  - resolft
  - confocal_point

modules:
  - name: easy3d_sted # Flag: Verify this matches a canonical ID in vocab/modules.yaml
    notes: Programmable SLM-based module for 2D/3D STED phase pattern generation.
    url: ''
  - name: adaptive_optics # Flag: Verify this matches a canonical ID in vocab/modules.yaml
    notes: "Supports deep imaging up to 75 \xB5m into cleared tissue with 100x oil objective."
    url: ''
  - name: rescue_sted # Flag: Verify this matches a canonical ID in vocab/modules.yaml
    notes: Reduction of state transition cycles mode for super-resolution live imaging with lower light dose.
    url: ''

