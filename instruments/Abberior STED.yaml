instrument:
  display_name: Abberior STED
  instrument_id: scope-1e33f909
  manufacturer: Abberior
  model: STED/RESOLFT
  year_of_purchase: ''
  funding: ''
  stand_orientation: inverted
  ocular_availability: trinocular
  location: BioCity, 5th floor, BioPhysics room 5086
  notes: Abberior STED. Sophisticated and highly flexible open platform that can be
    modified, extended, and upgraded. Typical resolution is ~40 nm in XY and ~150
    nm in Z using Easy3D STED. Easy3D uses a programmable spatial light modulator
    (SLM) to create 2D/3D STED phase patterns. Easy3D with adaptive optics enables
    deep imaging up to 75 µm into cleared tissue with a 100x oil objective. RESCue
    STED is available for live super-resolution imaging with reduced light dose.
  url: ''
capabilities:
  imaging_modes:
  - sted
  - resolft
  - confocal_point
  contrast_methods: []
  readouts: []
  workflows: []
  assay_operations: []
  non_optical: []
modules:
- type: easy3d_sted
  manufacturer: Abberior
  model: easy3D STED
  notes: Programmable SLM-based module for 2D/3D STED phase pattern generation.
  url: ''
- type: adaptive_optics
  manufacturer: Abberior
  model: Adaptive Optics
  notes: Supports deep imaging up to 75 µm into cleared tissue with a 100x oil objective.
  url: ''
- type: rescue_sted
  manufacturer: Abberior
  model: RESCue STED
  notes: Reduction of state transition cycles mode for super-resolution live imaging
    with lower light dose.
  url: ''
software:
- role: acquisition
  name: Abberior Imspector
  version: ''
  url: ''
hardware:
  scanner:
