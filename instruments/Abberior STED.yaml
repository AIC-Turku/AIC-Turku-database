  - id: 60x_water
    manufacturer: Olympus
    model: UPlanSApo 60x/1.2 W
    product_code: N6432600
    magnification: 60.0
    numerical_aperture: 1.2
    working_distance: 0.28 mm
    immersion: water
    correction: plan_apochromat
    is_installed: true
  - id: 100x_oil
