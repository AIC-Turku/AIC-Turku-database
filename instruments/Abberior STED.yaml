instrument:
  display_name: Abberior STED
  instrument_id: scope-1e33f909
  manufacturer: Abberior
  model: STED/RESOLFT
  year_of_purchase: ''
  funding: ''
  stand_orientation: inverted
  ocular_availability: trinocular
  location: BioCity, 5th floor, BioPhysics room 5086
  notes: "Abberior STED. Sophisticated and highly flexible open platform that can be modified, extended, and upgraded. Typical resolution is ~40 nm in XY and ~150 nm in Z using Easy3D STED. Easy3D uses a programmable spatial light modulator (SLM) to create 2D/3D STED phase patterns. Easy3D with adaptive optics enables deep imaging up to 75 \xB5m into cleared tissue with a 100x oil objective. RESCue STED is available for live super-resolution imaging with reduced light dose."
  url: ''

modalities:
  - sted
  - resolft
  - confocal_point

modules:
  - name: easy3d_sted
    manufacturer: Abberior
    notes: Programmable SLM-based module for 2D/3D STED phase pattern generation.
  - name: adaptive_optics
    manufacturer: Abberior
    notes: "Supports deep imaging up to 75 \xB5m into cleared tissue with 100x oil objective."
  - name: rescue_sted
    manufacturer: Abberior
    notes: Reduction of state transition cycles mode for super-resolution live imaging with lower light dose.

software:
  - role: acquisition
    name: Abberior Imspector
    version: ''

hardware:
  scanner:
    type: galvo
    notes: STED point scanning configuration.

  light_sources:
    - kind: laser
      manufacturer: PicoQuant
      model: LDH-D-C-485
      role: excitation
      timing_mode: pulsed
      wavelength_nm: 488
      pulse_width_ps: 80
      repetition_rate_mhz: 40
      notes: pulsed excitation
    - kind: laser
      manufacturer: PicoQuant
      model: PDL-T 561
      role: excitation
      timing_mode: pulsed
      wavelength_nm: 561
      pulse_width_ps: 80
      repetition_rate_mhz: 40
      notes: pulsed excitation
    - kind: laser
      manufacturer: PicoQuant
      model: LDH-D-C-640
      role: excitation
      timing_mode: pulsed
      wavelength_nm: 640
      pulse_width_ps: 80
      repetition_rate_mhz: 40
      notes: pulsed excitation
    - kind: laser
      manufacturer: MPB Communications
      model: VFL-P-1000-580
      role: depletion
      timing_mode: continuous
      wavelength_nm: 580
      depletion_targets_nm:
        - 488
      notes: STED depletion (continuous, for 488 nm)
    - kind: laser
      manufacturer: OneFive / NKT Photonics
      model: Katana HP 775
      role: depletion
      timing_mode: pulsed
      wavelength_nm: 775
      pulse_width_ps: 600
      repetition_rate_mhz: 40
      depletion_targets_nm:
        - 561
        - 640
      notes: STED depletion (pulsed, for 561 & 640 nm)

  detectors:
    - kind: pmt
      manufacturer: Hamamatsu Photonics
      model: Photomultiplier Tube
      notes: ''
    - kind: apd
      manufacturer: Excelitas Technologies
      model: SPCM-AQRH-14-TR
      supports_time_gating: true
      default_gating_delay_ns: 1.0
      default_gate_width_ns: 7.0
      notes: 2 detectors; timing resolution optimized for time-gated CW-STED.
    - kind: ccd
      manufacturer: Generic
      model: Monochrome CCD camera
      pixel_pitch_um: 4.65
      sensor_format_px: "1280 x 960"
      notes: "1/2-inch format"

  filters:
    - name: GFP
      location: emission
      product_code: Semrock FF01-525/25
      emission: 525/25
    - name: CY3
      location: emission
      product_code: Semrock BrightLine 615/10
      emission: 615/10
    - name: CY5
      location: emission
      product_code: Chroma ET685/35
      emission: 685/35

  objectives:
    - id: 20x_air
      manufacturer: Olympus
      model: LMPlanFL N
      product_code: 1-U2N345
      magnification: 20.0
      numerical_aperture: 0.4
      working_distance: 1.2 mm
      immersion: air
      correction: plan_fluorite
      is_installed: true
    - id: 60x_water
      manufacturer: Olympus
      model: UPlanSApo
      product_code: 1-U2B832
      magnification: 60.0
      numerical_aperture: 1.2
      working_distance: 0.28 mm
      immersion: water
      correction: super_apochromat
      is_installed: true
    - id: 100x_oil
      manufacturer: Olympus
      model: UPlanSApo
      product_code: 1-U2B833
      magnification: 100.0
      numerical_aperture: 1.4
      working_distance: 0.13 mm
      immersion: oil
      correction: super_apochromat
      is_installed: true

  optical_modulators:
    - type: spatial_light_modulator
      manufacturer: Abberior
      model: easy3D SLM
      supported_phase_masks:
        - 2D_helical_vortex
        - 3D_annular_z_bottle
      notes: Used for STED phase mask generation and adaptive optics.

  illumination_logic:
    - method: RESCue
      default_enabled: false
      notes: Real-time decision algorithm to reduce photobleaching.
