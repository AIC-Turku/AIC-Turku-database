instrument:
  display_name: EVOS fl
  instrument_id: scope-evos-fl
  manufacturer: Thermo Fisher / AMG
  model: FL
  year_of_purchase: '2011'
  funding: 'Turun Yliopisto / Biotekniikan keskus'
  stand_orientation: inverted
  ocular_availability: camera_only
  location: Local Cell Culture Lab, Biocity 5th Floor
  notes: 'Widefield fluorescence microscope (inverted). Imaging modes: Brightfield (transmitted), Fluorescence (LED illumination). Usage: All users are free to use the microscope after instrument-specific training (contact AIC staff for training). IMPORTANT: Only AIC personnel are allowed to change filter cubes.'
  url: ''

modalities:
  - widefield_fluorescence
  - transmitted_brightfield
  - phase_contrast

modules:
  - name: universal_vessel_holder
    manufacturer: Thermo Fisher
    model: Universal Vessel Holder
    product_code: AMEP-VH009
    notes: ''
    url: 'https://www.thermofisher.com/order/catalog/product/AMEPVH009'

software:
  - role: acquisition
    name: On-board EVOS interface
    version: ''
    notes: 'no external software, USB storage'
    url: 'https://www.thermofisher.com/fi/en/home/life-science/cell-analysis/cellular-imaging/evos-cell-imaging-systems/software.html'

hardware:
  scanner:
    type: none
    notes: ''
    url: ''

  light_sources:
    - kind: led
      manufacturer: Thermo Fisher / AMG
      model: Transmitted Light LED
      wavelength_nm: ''
      notes: Broad spectrum overhead LED used for brightfield and phase contrast.
      path: transmitted
    - kind: led
      manufacturer: Thermo Fisher / AMG
      model: EVOS DAPI Light Cube LED
      wavelength_nm: 357
      notes: Integrated LED inside the DAPI Light Cube
      path: epi
    - kind: led
      manufacturer: Thermo Fisher / AMG
      model: EVOS CFP Light Cube LED
      wavelength_nm: 445
      notes: Integrated LED inside the CFP Light Cube
      path: epi
    - kind: led
      manufacturer: Thermo Fisher / AMG
      model: EVOS GFP Light Cube LED
      wavelength_nm: 470
      notes: Integrated LED inside the GFP Light Cube
      path: epi
    - kind: led
      manufacturer: Thermo Fisher / AMG
      model: EVOS RFP Light Cube LED
      wavelength_nm: 531
      notes: Integrated LED inside the RFP Light Cube
      path: epi
    - kind: led
      manufacturer: Thermo Fisher / AMG
      model: EVOS Cy5 Light Cube LED
      wavelength_nm: 628
      notes: Integrated LED inside the Cy5 Light Cube
      path: epi

  detectors:
    - kind: ccd
      manufacturer: AMG (Thermo Fisher)
      model: Sony ICX285AQ Color CCD
      pixel_pitch_um: 6.45
      notes: Integrated color camera for brightfield (1.4 Megapixels).
      url: ''
      id: detector_1
    - kind: ccd
      manufacturer: AMG (Thermo Fisher)
      model: AMF-4302 (Sony ICX285AL Monochrome CCD)
      pixel_pitch_um: 6.45
      notes: Integrated monochrome camera for fluorescence (1.4 Megapixels).
      url: ''
      id: detector_2

  light_path:
    endpoints:
      - id: detector_1
        endpoint_type: detector
        display_label: "Integrated Color Camera"
        path: transmitted
      - id: detector_2
        endpoint_type: detector
        display_label: "Integrated Monochrome Camera"
        path: epi
    cube_mechanisms:
      - name: Light Cube Turret
        type: turret
        slots: 5
        path: epi
        notes: 'Filter sets must be changed manually. Only CIC personnel are allowed to change filter cubes. The facility has 5 cubes available: DAPI, CFP, GFP, RFP, and Cy5.'
        positions:
          Pos_1:
            name: DAPI
            product_code: 'ZP-EPI-9001'
            notes: Included with base unit
            excitation_filter:
              component_type: bandpass
              center_nm: 357
              width_nm: 44
            dichroic:
              component_type: dichroic
              cutoffs_nm: [400]
            emission_filter:
              component_type: bandpass
              center_nm: 447
              width_nm: 60
          Pos_2:
            name: CFP
            product_code: 'AMEP-4653'
            excitation_filter:
              component_type: bandpass
              center_nm: 445
              width_nm: 45
            dichroic:
              component_type: dichroic
              cutoffs_nm: [480]
            emission_filter:
              component_type: bandpass
              center_nm: 510
              width_nm: 42
          Pos_3:
            name: GFP/Alexa 488
            product_code: 'ZP-EPI-9002'
            notes: Included with base unit
            excitation_filter:
              component_type: bandpass
              center_nm: 470
              width_nm: 22
            dichroic:
              component_type: dichroic
              cutoffs_nm: [495]
            emission_filter:
              component_type: bandpass
              center_nm: 510
              width_nm: 42
          Pos_4:
            name: RFP/Alexa 555
            product_code: 'ZP-EPI-9003'
            notes: Included with base unit
            excitation_filter:
              component_type: bandpass
              center_nm: 531
              width_nm: 40
            dichroic:
              component_type: dichroic
              cutoffs_nm: [560]
            emission_filter:
              component_type: bandpass
              center_nm: 593
              width_nm: 40
          Pos_5:
            name: Cy5/Alexa 647
            product_code: 'AMEP-4656'
            excitation_filter:
              component_type: bandpass
              center_nm: 628
              width_nm: 40
            dichroic:
              component_type: dichroic
              cutoffs_nm: [660]
            emission_filter:
              component_type: bandpass
              center_nm: 692
              width_nm: 40

  objectives:
    - id: 4x_air
      manufacturer: Olympus
      model: U Plan FL N 4x/0.13 PhP
      product_code: ''
      magnification: 4.0
      numerical_aperture: 0.13
      working_distance: 16.4 mm
      immersion: air
      correction: fluorite
      afc_compatible: false
      specialties:
        - phase
      notes: 'PhP'
      url: ''
      is_installed: true
    - id: 10x_air
      manufacturer: AMG (Thermo Fisher)
      model: Plan Fluor 10x/0.3
      product_code: 'AMG-AMEP 4623'
      magnification: 10.0
      numerical_aperture: 0.3
      working_distance: 8.3 mm
      immersion: air
      correction: plan_fluorite
      afc_compatible: false
      specialties: []
      notes: Fluorite (FL)
      url: ''
      is_installed: true
    - id: 20x_air
      manufacturer: AMG (Thermo Fisher)
      model: Plan Fluor 20x/0.45
      product_code: 'AMG-AMEP 4624'
      magnification: 20.0
      numerical_aperture: 0.45
      working_distance: 7.1 mm
      immersion: air
      correction: plan_fluorite
      afc_compatible: false
      specialties: []
      notes: Fluorite (FL)
      url: ''
      is_installed: true
    - id: 40x_air
      manufacturer: AMG (Thermo Fisher)
      model: Plan Fluor 40x/0.65
      product_code: 'AMG-AMEP 4625'
      magnification: 40.0
      numerical_aperture: 0.65
