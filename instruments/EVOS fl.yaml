  sources:
  - kind: led
    manufacturer: Thermo Fisher / AMG
    model: Transmitted Light LED
    notes: Broad spectrum overhead LED used for brightfield and phase contrast.
    id: transmitted_light_led
    modalities:
    - transmitted_brightfield
    - phase_contrast
  - kind: led
    manufacturer: Thermo Fisher / AMG
    model: EVOS DAPI Light Cube LED
    wavelength_nm: 357
    notes: Integrated LED inside the DAPI Light Cube
    id: evos_dapi_light_cube_led
    modalities:
    - widefield_fluorescence
  - kind: led
    manufacturer: Thermo Fisher / AMG
    model: EVOS CFP Light Cube LED
    wavelength_nm: 445
    notes: Integrated LED inside the CFP Light Cube
    id: evos_cfp_light_cube_led
    modalities:
    - widefield_fluorescence
  - kind: led
    manufacturer: Thermo Fisher / AMG
    model: EVOS GFP Light Cube LED
    wavelength_nm: 470
    notes: Integrated LED inside the GFP Light Cube
    id: evos_gfp_light_cube_led
    modalities:
    - widefield_fluorescence
  - kind: led
    manufacturer: Thermo Fisher / AMG
    model: EVOS RFP Light Cube LED
    wavelength_nm: 531
    notes: Integrated LED inside the RFP Light Cube
    id: evos_rfp_light_cube_led
    modalities:
    - widefield_fluorescence
  - kind: led
    manufacturer: Thermo Fisher / AMG
    model: EVOS Cy5 Light Cube LED
    wavelength_nm: 628
    notes: Integrated LED inside the Cy5 Light Cube
    id: evos_cy5_light_cube_led
    modalities:
    - widefield_fluorescence
  optical_path_elements:
  - name: Light Cube Turret
    stage_role: cube
    id: light_cube_turret
    element_type: turret
    modalities:
    - widefield_fluorescence
    notes: Filter sets must be changed manually. Only AIC personnel are allowed to
      change filter cubes.
    positions:
      Pos_1:
        name: DAPI
        component_type: filter_cube
        product_code: ZP-EPI-9001
        bands:
        - center_nm: 447
          width_nm: 60
        notes: 'Included with base unit. Excitation: 357/44 nm. Dichroic Cutoff: 400
          nm.'
        excitation_filter:
          component_type: bandpass
          center_nm: 357
          width_nm: 44
        dichroic:
          component_type: dichroic
          cut_on_nm: 400
        emission_filter:
          component_type: bandpass
          center_nm: 447
          width_nm: 60
      Pos_2:
        name: CFP
        component_type: filter_cube
        product_code: AMEP-4653
        bands:
        - center_nm: 510
          width_nm: 42
        notes: 'Excitation: 445/45 nm. Dichroic Cutoff: 480 nm.'
        excitation_filter:
          component_type: bandpass
          center_nm: 445
          width_nm: 45
        dichroic:
          component_type: dichroic
          cut_on_nm: 480
        emission_filter:
          component_type: bandpass
          center_nm: 510
          width_nm: 42
      Pos_3:
        name: GFP/Alexa 488
        component_type: filter_cube
        product_code: ZP-EPI-9002
        bands:
        - center_nm: 510
          width_nm: 42
        notes: 'Included with base unit. Excitation: 470/22 nm. Dichroic Cutoff: 495
          nm.'
        excitation_filter:
          component_type: bandpass
          center_nm: 470
          width_nm: 22
        dichroic:
          component_type: dichroic
          cut_on_nm: 495
        emission_filter:
          component_type: bandpass
          center_nm: 510
          width_nm: 42
      Pos_4:
        name: RFP/Alexa 555
        component_type: filter_cube
        product_code: ZP-EPI-9003
        bands:
        - center_nm: 593
          width_nm: 40
        notes: 'Included with base unit. Excitation: 531/40 nm. Dichroic Cutoff: 560
          nm.'
        excitation_filter:
          component_type: bandpass
          center_nm: 531
          width_nm: 40
        dichroic:
          component_type: dichroic
          cut_on_nm: 560
        emission_filter:
          component_type: bandpass
          center_nm: 593
          width_nm: 40
      Pos_5:
        name: Cy5/Alexa 647
        component_type: filter_cube
        product_code: AMEP-4656
        bands:
        - center_nm: 692
          width_nm: 40
        notes: 'Excitation: 628/40 nm. Dichroic Cutoff: 660 nm.'
        excitation_filter:
          component_type: bandpass
          center_nm: 628
          width_nm: 40
        dichroic:
          component_type: dichroic
          cut_on_nm: 660
        emission_filter:
          component_type: bandpass
          center_nm: 692
          width_nm: 40
  endpoints: []
light_paths:
- id: widefield_fluorescence
  name: Widefield Fluorescence
  illumination_sequence:
  - source_id: evos_dapi_light_cube_led
  - source_id: evos_cfp_light_cube_led
  - source_id: evos_gfp_light_cube_led
  - source_id: evos_rfp_light_cube_led
  - source_id: evos_cy5_light_cube_led
  - optical_path_element_id: light_cube_turret
  detection_sequence:
  - optical_path_element_id: light_cube_turret
  - endpoint_id: integrated_fluorescence_camera
  route_type: widefield_fluorescence
- id: transmitted_brightfield
  name: Transmitted Light
  illumination_sequence:
  - source_id: transmitted_light_led
  detection_sequence:
  - endpoint_id: integrated_color_camera
  route_type: transmitted_brightfield
- id: phase_contrast
  name: Phase Contrast
  illumination_sequence:
  - source_id: transmitted_light_led
  detection_sequence:
  - endpoint_id: integrated_color_camera
  route_type: phase_contrast
  notes: Shares the same documented physical path as transmitted_brightfield; phase contrast is supported by the broad-spectrum transmitted-light LED.
