          center_nm: 560
          width_nm: 40
        dichroic:
          component_type: dichroic
          cut_on_nm: 585
        emission_filter:
          component_type: bandpass
          center_nm: 630
          width_nm: 75
        notes: Catalogue-derived TXR cube bands; verify against installed cube label
          if exact bands matter.
      cy5_narrow_cube:
        slot: 4
        component_type: filter_cube
        manufacturer: Leica Microsystems
        model: Filter cube Cy5 narrow excitation, size P
        product_code: '11536078'
        excitation_filter:
          component_type: bandpass
          center_nm: 640
          width_nm: 30
        dichroic:
          component_type: dichroic
          cut_on_nm: 660
        emission_filter:
          component_type: bandpass
          center_nm: 690
          width_nm: 50
        notes: Catalogue-derived Cy5 narrow bands from product listing; verify against
          installed cube label if exact bands matter.
      icr_reflector_cube:
        slot: 5
        component_type: analyzer
        manufacturer: Leica Microsystems
        model: Reflector cube ICR
        product_code: '11525375'
        notes: Reflector cube with 45° dichroic mirror and permanently installed and
