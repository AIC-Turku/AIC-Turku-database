light_paths:
- id: confocal_point
  name: Confocal spectral / FALCON FLIM / FCS
  illumination_sequence:
  - source_id: white_light_laser_wll
  - source_id: laser_405_dmod
  - optical_path_element_id: aobs
  detection_sequence:
  - optical_path_element_id: aobs
  - optical_path_element_id: spectral_detection_unit
  - branches:
      selection_mode: multiple
      items:
      - branch_id: hyd_s_position_1
        label: Power HyD S SP pos 1
        sequence:
        - endpoint_id: hyd_s_sp_pos_1
      - branch_id: hyd_x_position_2
        label: Power HyD X SP pos 2
        sequence:
        - endpoint_id: hyd_x_sp_pos_2
      - branch_id: hyd_s_position_3
        label: Power HyD S SP Core Unit pos 3
        sequence:
        - endpoint_id: hyd_s_sp_pos_3
      - branch_id: hyd_x_position_4
        label: Power HyD X SP pos 4
        sequence:
        - endpoint_id: hyd_x_sp_pos_4
      - branch_id: hyd_r_position_5
        label: Power HyD R SP pos 5
        sequence:
        - endpoint_id: hyd_r_sp_pos_5
  readouts:
  - spectral_imaging
  - flim
  - fcs
  route_type: confocal_point
- id: widefield_fluorescence
  name: LED / filter-cube observation
  illumination_sequence:
  - source_id: leica_led_3
  - optical_path_element_id: epi_filter_cube_turret
  detection_sequence:
  - optical_path_element_id: epi_filter_cube_turret
  - optical_path_element_id: eyepiece_camera_selector
  - branches:
      selection_mode: exclusive
      items:
      - branch_id: to_k5_camera
        label: To Leica K5 camera
        sequence:
        - endpoint_id: k5_camera
      - branch_id: to_eyepieces
        label: To eyepieces
        sequence:
        - endpoint_id: eyepieces
  route_type: widefield_fluorescence
- id: transmitted_brightfield
  name: Transmitted brightfield
  illumination_sequence:
  - source_id: leica_led_3
  - optical_path_element_id: transmitted_light_path
  detection_sequence:
  - optical_path_element_id: transmitted_light_path
  - branches:
      selection_mode: exclusive
      items:
      - branch_id: to_bf_detector
        label: To BF detector for DMI
        sequence:
        - endpoint_id: bf_detector_dmi
      - branch_id: to_k5_camera
        label: To Leica K5 camera
        sequence:
        - endpoint_id: k5_camera
      - branch_id: to_eyepieces
        label: To eyepieces
        sequence:
        - endpoint_id: eyepieces
  route_type: transmitted_brightfield
