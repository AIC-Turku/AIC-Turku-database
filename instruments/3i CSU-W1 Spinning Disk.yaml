  instrument_id: scope-3i-csu-w1-spinning-disk
  manufacturer: 3i / Zeiss
  model: Marianas CSU-W1 Spinning Disk Confocal
  year_of_purchase: ''
  funding: ''
  stand_orientation: inverted
  ocular_availability: trinocular
  location: BioCity, 5th floor, room 5149
  notes: "Confocal spinning-disk microscope (inverted) with 50 \xB5m pinholes. Optimized for fast, gentle imaging of live samples and large fields of view. Imaging modes: Confocal (spinning disk), Live-cell time-lapse, FRAP, Photoactivation."
  url: ''

modalities:
  - confocal_spinning_disk
  - frap
  - photoactivation

modules:
  - name: frap
    notes: FRAP/Photoactivation laser module (for bleaching and activation)
    url: ''
  - name: piezo_z_stage
    notes: "ASI piezo stage (300 \xB5m travel)"
    url: ''
  - name: hardware_autofocus
    notes: Definite Focus
    url: ''
  - name: incubation
    notes: Okolab environment chamber with temperature control
    url: ''

