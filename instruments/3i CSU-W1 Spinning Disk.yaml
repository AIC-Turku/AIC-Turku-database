instrument:
  display_name: 3i CSU-W1 Spinning Disk
  instrument_id: scope-3i-csu-w1-spinning-disk
  manufacturer: 3i / Zeiss
  model: Marianas CSU-W1 Spinning Disk Confocal
  year_of_purchase: ''
  funding: ''
  stand_orientation: inverted
  ocular_availability: trinocular
  location: BioCity, 5th floor, room 5149
  notes: "Confocal spinning-disk microscope (inverted) with 50 µm pinholes. Optimized for fast, gentle imaging of live samples and large fields of view. Imaging modes: Confocal (spinning disk), Live-cell time-lapse, FRAP, Photoactivation."
  url: ''

modalities:
  - confocal_spinning_disk
  - frap
  - photoactivation

modules:
  - name: frap
    manufacturer: 3i
    model: Vector
    notes: FRAP/Photoactivation laser module (for bleaching and activation)
    url: ''
  - name: piezo_z_stage
    manufacturer: ASI
    model: PZ-2000
    notes: "ASI piezo stage (300 µm travel)"
    url: ''
  - name: hardware_autofocus
    manufacturer: Zeiss
    model: Definite Focus
    notes: Definite Focus
    url: ''
  - name: incubation
    manufacturer: Okolab
    model: Full Enclosure
    notes: Okolab environment chamber with temperature control
    url: ''

software:
  - role: acquisition
    name: 3i SlideBook
    version: '6'
    url: ''

hardware:
  environment:
    temperature_control: true
    co2_control: true
    o2_control: true
    notes: Okolab Full Enclosure Incubator with Temperature and digital CO2/O2 Control

  stages:
    - type: z_piezo
      manufacturer: ASI
      notes: "ASI piezo stage (300 µm travel)"

  hardware_autofocus:
    is_installed: true
    type: infrared_reflection

  scanner:
    type: spinning_disk
    pinhole_um: 50
    notes: "Yokogawa CSU-W1 with 50 µm pinhole disk"
    url: ''

  light_sources:
    - kind: laser
      manufacturer: 'Coherent' # Fill in actual manufacturer
      model: 405 nm
      wavelength_nm: 405
      power: 100 mW
      notes: ''
      url: ''
    - kind: laser
      manufacturer: 'Coherent' # Fill in actual manufacturer
      model: 488 nm
      wavelength_nm: 488
      power: 150 mW
      notes: ''
      url: ''
    - kind: laser
      manufacturer: 'Coherent' # Fill in actual manufacturer
      model: 561 nm
      wavelength_nm: 561
      power: 100 mW
      notes: ''
      url: ''
    - kind: laser
      manufacturer: 'Coherent' # Fill in actual manufacturer
      model: 640 nm
      wavelength_nm: 640
      power: 100 mW
      notes: ''
      url: ''
    - kind: laser
      manufacturer: 'Coherent' # Fill in actual manufacturer
      model: 730 nm
      wavelength_nm: 730
      power: 40 mW
      notes: ''
      url: ''

  detectors:
    - kind: scmos
      manufacturer: Hamamatsu
      model: Orca Flash4.0
      pixel_pitch_um: 6.5
      qe_peak_pct: 82 
      sensor_format_px: "2048 x 2048"
      notes: ""
      url: ''
    - kind: emccd
      manufacturer: Photometrics
      model: Evolve
      pixel_pitch_um: 16.0
      qe_peak_pct: 95 
      sensor_format_px: "512 x 512"
      notes: "10 MHz back-illuminated EMCCD"
      url: ''

  light_path:
    dichroic_mechanisms:
      - name: CSU Dichroic Wheel
        type: filter_wheel
        slots: 2
        positions:
          1:
            component_type: dichroic
            name: Quad-band Dichroic
            cutoffs_nm: [440, 521, 607, 700]
    emission_mechanisms:
      - name: Emission Wheel
        type: filter_wheel
        slots: 5
        positions:
          1:
            component_type: bandpass
            name: DAPI
            center_nm: 445
            width_nm: 45
          2:
            component_type: bandpass
            name: GFP
            center_nm: 525
            width_nm: 50
            notes: Previously 525/30 before 18.08.21
          3:
            component_type: bandpass
            name: Cy3/Alexa 568
            center_nm: 617
            width_nm: 73
          4:
            component_type: bandpass
            name: Cy5/Alexa 647
            center_nm: 692
            width_nm: 40
          5:
            component_type: bandpass
            name: Alexa 750
            center_nm: 809
            width_nm: 81

  splitters: []

  objectives:
    - id: 10x_air
      manufacturer: Zeiss
      model: Plan-Apochromat 10x/0.45 Ph1 M27
      product_code: 420641-9910
      magnification: 10.0
      numerical_aperture: 0.45
      working_distance: 2.0 mm
      immersion: air
      correction: plan_apochromat
      afc_compatible: false
      specialties: []
