instrument:
  display_name: Agilent xCELLigence RTCA eSight
  instrument_id: scope-agilent-rtca-esight
  manufacturer: Agilent
  model: xCELLigence RTCA eSight
  year_of_purchase: '2024'
  funding: Testament funds from Henna Ruusunen
  stand_orientation: benchtop
  ocular_availability: camera_only
  location: BioCity, 5th floor
  notes: 'Real-time cell analysis system combining label-free impedance monitoring
    with live-cell imaging.

    Dimensions: 43.1 x 44.5 x 41.4 cm, 27.2 kg.

    Placed inside a standard CO2 incubator for operation (Operating range: 20-40°C,
    5-98% RH).'
  url: https://www.agilent.com/lifesciences/eSight
modalities:
- impedance_cytometry
- widefield_fluorescence
- transmitted_brightfield
- live_cell_imaging
modules:
- name: environmental_enclosure
  notes: Designed for operation inside cell culture incubator (20-40°C, 5-98% RH).
  url: ''
  manufacturer: Agilent
  model: Incubator-compatible Environmental Enclosure
- name: hardware_autofocus
  notes: Image-based autofocus.
  url: ''
  manufacturer: Agilent
  model: Image-based Autofocus
- name: impedance_module
  notes: 22 mV rms +/- 20% at 10 kHz; Accuracy +/- (1.5% + 1 Ohm).
  url: ''
  manufacturer: Agilent
  model: Impedance Measurement Module
software:
- role: acquisition
  name: RTCA eSight Software
  version: ''
  url: https://www.agilent.com/lifesciences/eSight
hardware:
  environment:
    temperature_control: true
    co2_control: true
    humidity_control: true
    notes: Operates inside a standard cell culture incubator.
  hardware_autofocus:
    is_installed: true
    type: contrast_based
  scanner:
    type: stage_scanning
    notes: Supports E-Plate 96, E-Plate VIEW 96, and ANSI/SLAS standard plates.
    url: ''
  detectors:
  - kind: cmos
    manufacturer: Sony
    model: 5.0 MP Monochromatic CMOS
    pixel_pitch_um: 3.45
    notes: up to 35 fps.
    url: ''
    id: detector_1
  filters:
  - name: Blue Channel
    location: Internal
    product_code: ''
    excitation: 381-404
    dichroic: ''
    emission: 427-462
    notes: e.g., DAPI/Hoechst
    url: ''
  - name: Green Channel
    location: Internal
    product_code: ''
    excitation: 473-491
    dichroic: ''
    emission: 503-561
    notes: e.g., FITC/GFP
    url: ''
  - name: Red Channel
    location: Internal
    product_code: ''
    excitation: 584-605
    dichroic: ''
    emission: 621-720
    notes: e.g., Cy3/Texas Red
    url: ''
  objectives:
  - id: 10x_air
    manufacturer: Agilent
    model: 10x Objective
    product_code: ''
    magnification: 10.0
    numerical_aperture: null
    working_distance: ''
    immersion: air
    correction: ''
    afc_compatible: true
    specialties: []
    notes: 'Default. Resolution: 1.72 µm/pixel. FOV: 1.68 x 1.40 mm.'
    url: ''
    is_installed: true
  sources:
  - kind: led
    manufacturer: Agilent
    model: High-power LED (Blue)
    wavelength_nm: 381-404
    power: ''
    notes: Blue Excitation
    url: ''
    id: high_power_led_blue
    modalities:
    - epi
    path: epi
  - kind: led
    manufacturer: Agilent
    model: High-power LED (Green)
    wavelength_nm: 473-491
    power: ''
    notes: Green Excitation
    url: ''
    id: high_power_led_green
    modalities:
    - epi
    path: epi
  - kind: led
    manufacturer: Agilent
    model: High-power LED (Red)
    wavelength_nm: 584-605
    power: ''
    notes: Red Excitation
    url: ''
    id: high_power_led_red
    modalities:
    - epi
    path: epi
  optical_path_elements: []
  endpoints: []
light_paths:
- id: epi
  name: Epi-fluorescence
  illumination_sequence:
  - source_id: high_power_led_blue
  - source_id: high_power_led_green
  - source_id: high_power_led_red
  detection_sequence: []
