  optical_path_elements:
  - name: BC43 Internal Dichroic
    stage_role: dichroic
    id: bc43_internal_dichroic
    element_type: fixed
    modalities:
    - confocal_spinning_disk
    - widefield_fluorescence
    - transmitted_brightfield
    positions:
      Pos_1:
        component_type: multiband_dichroic
        bands:
        - center_nm: 450
          width_nm: 50
        - center_nm: 525
          width_nm: 50
        - center_nm: 600
          width_nm: 50
        - center_nm: 685
          width_nm: 50
        notes: Built-in multiband dichroic for standard 4-line excitation. Explicit
          transmission windows are aligned to the installed emission channels.
  - name: BC43 Internal Emission Filters
    slots: 4
    stage_role: emission
    id: bc43_internal_emission_filters
    element_type: filter_wheel
    modalities:
    - confocal_spinning_disk
    - widefield_fluorescence
    - transmitted_brightfield
    positions:
      Pos_1:
        name: DAPI
        component_type: bandpass
        bands:
