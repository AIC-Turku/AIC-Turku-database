instrument:
  display_name: Andor BC43 Benchtop Confocal
  instrument_id: scope-andor-bc43
  manufacturer: Andor
  model: BC43
  year_of_purchase: '2026'
  funding: Research Council of Finland FIRI funding
  stand_orientation: benchtop
  ocular_availability: camera_only
  location: BioCity, 5th floor, room 5149
  notes: Benchtop microlens-spinning disk confocal with Borealis illumination and ClearView GPU-accelerated deconvolution.
  url: https://andor.oxinst.com/products/bc43-benchtop-confocal-microscope

modalities:
  - confocal_spinning_disk
  - widefield_fluorescence
  - transmitted_brightfield
  - phase_contrast

modules:
  - name: hardware_autofocus
    notes: Dual function Focus Seek and Lock
    url: ''
  - name: incubation
    notes: TOPSTAGE-ANDOR-BL3 Incubator Bundle (T/H/CO2)
    url: ''

software:
  - role: acquisition
    name: Fusion BC43
    version: 2.7.0
    developer: Andor
    url: https://fusion-benchtop-software-guide.scrollhelp.site/bc43softwareguide/
hardware:
  environment:
    temperature_control: true
    co2_control: true
    humidity_control: true
    notes: TOPSTAGE-ANDOR-BL3 Incubator Bundle (T/H/CO2)

  hardware_autofocus:
    is_installed: true
    type: infrared_reflection # Flag: Verify this matches a canonical ID in vocab/autofocus_types.yaml

  scanner:
    type: spinning_disk
    pinhole_um: null # Flag: strictly required by policy for spinning_disk. Please provide size (e.g., 40, 50).
    notes: Microlens-spinning disk multipoint confocal
    url: ''

  light_sources:
    - kind: laser
      manufacturer: Andor
      model: Borealis Illumination
      wavelength_nm: '405'
      power: ''
      notes: Part of BC43 excitation lines
      url: ''
    - kind: laser
      manufacturer: Andor
      model: Borealis Illumination
      wavelength_nm: '488'
      power: ''
      notes: Part of BC43 excitation lines
      url: ''
    - kind: laser
      manufacturer: Andor
      model: Borealis Illumination
      wavelength_nm: '561'
      power: ''
      notes: Part of BC43 excitation lines
      url: ''
    - kind: laser
      manufacturer: Andor
      model: Borealis Illumination
      wavelength_nm: '638'
      power: ''
      notes: Part of BC43 excitation lines
      url: ''

  detectors:
    - kind: scmos
      manufacturer: Andor
      model: 4.1 MP sCMOS
      pixel_pitch_um: 6.5
      qe_peak_pct: 82
      notes: "16-bit. 18.4 mm field of view."
      url: ''

  splitters: []

  filters:
    - name: DAPI
      location: Internal Emission Filter
      product_code: ''
      excitation: '' # Flag: Required because widefield_fluorescence is present.
      dichroic: '' # Flag: Required because widefield_fluorescence is present.
      emission: '' # Flag: Required because widefield_fluorescence is present.
      notes: Standard emission filter for DAPI included in BC43
      url: ''
    - name: GFP
