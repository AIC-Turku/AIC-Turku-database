  optical_path_elements:
    - name: Filter Turret
      # CORRECTED: Removed legacy 'type' and 'path' aliases
      stage_role: cube
      id: filter_turret
      element_type: turret
      modalities:
        - widefield_fluorescence
      positions:
        Pos_1: # CORRECTED: Changed integer keys to string format
          name: CYR71010
          product_code: '11525416'
          component_type: filter_cube # CORRECTED: Converted to canonical component type
          bands: # CORRECTED: Flattened nested filters and mapped to canonical bands array
            - center_nm: 473
              width_nm: 22
            - center_nm: 539
              width_nm: 24
            - center_nm: 641
              width_nm: 78
            - center_nm: 810
              width_nm: 80
          notes: 'Quad-band. Excitation: 436/28, 506/21, 578/24, 730/40 nm. Dichroic Cutoffs: 459, 523, 598, 763 nm.'
        Pos_2:
          name: DFT51010
          product_code: '11525418'
          component_type: filter_cube
          bands:
            - center_nm: 435
              width_nm: 30
            - center_nm: 519
              width_nm: 25
            - center_nm: 594
              width_nm: 32
            - center_nm: 695
              width_nm: 58
          notes: 'Quad-band. Excitation: 391/32, 479/33, 554/24, 638/31 nm. Dichroic Cutoffs: 415, 500, 572, 660 nm.'
        Pos_3:
          name: CY3
          component_type: filter_cube
          bands:
            - center_nm: 572
              width_nm: 23
          notes: 'LED: 555. Excitation: 546/10 nm. Dichroic Cutoff: 556 nm.'
        Pos_4:
          name: A594
          component_type: filter_cube
          bands:
            - center_nm: 630
              width_nm: 30
          notes: 'LED: 575. Excitation: 592/21 nm. Dichroic Cutoff: 610 nm.'
        Pos_5:
          name: EMP_BF
          product_code: '11525000'
          component_type: empty
          notes: Empty position for TL-methods excluding POL, DIC
        Pos_6:
          name: EMP+Pol
          product_code: '11525000'
          component_type: empty
          notes: Empty position for TL-methods including POL, DIC, requires external Analyser-slider
          
    - name: Standalone Emission Wheel
      # CORRECTED: Removed legacy 'type' and 'path' aliases
      stage_role: emission
      id: standalone_emission_wheel
      element_type: filter_wheel
      modalities:
        - widefield_fluorescence
      notes: External filter wheel; filter exchange time 21 ms (vs ~300 ms by microscope turret)
      positions:
        Pos_1:
          name: 460/80
          component_type: bandpass
          bands: # CORRECTED: Nested isolated parameters into the required 'bands' array
            - center_nm: 460
              width_nm: 80
        Pos_2:
          name: 535/70
          component_type: bandpass
          bands:
            - center_nm: 535
              width_nm: 70
        Pos_3:
          name: 590/50
          component_type: bandpass
          bands:
            - center_nm: 590
              width_nm: 50
        Pos_4:
          name: 642/80
          component_type: bandpass
          bands:
            - center_nm: 642
              width_nm: 80
        Pos_5:
          component_type: empty
        Pos_6:
          component_type: empty

    - id: trinocular_port_selector
      name: Trinocular Port Selector
      stage_role: splitter
      element_type: splitter
      selection_mode: exclusive
      supported_branch_modes:
        - selected
      supported_branch_count: 2
      modalities:
        - widefield_fluorescence
        - transmitted_brightfield

  # CORRECTED: Removed the deprecated hardware.endpoints block.

light_paths:
  - id: widefield_fluorescence # CORRECTED: Aligned ID with standard modalities
    name: Epi-fluorescence
    modalities:
      - widefield_fluorescence
    illumination_sequence:
      - source_id: led_8
      - source_id: led_8_2
      - source_id: led_8_3
      - source_id: led_8_4
      - source_id: led_8_5
      - source_id: led_8_6
      - source_id: led_8_7
      - source_id: led_8_8
      - optical_path_element_id: filter_turret
    detection_sequence:
      - optical_path_element_id: filter_turret
      - optical_path_element_id: standalone_emission_wheel
      - optical_path_element_id: trinocular_port_selector
      - branches:
          selection_mode: exclusive 
          items:
            - branch_id: to_k8
              label: "To K8 sCMOS"
              sequence:
                - endpoint_id: detector_1
            - branch_id: to_eyepieces 
              label: "To Eyepieces"
              sequence:
                - endpoint_id: eyepieces
                
  - id: transmitted_brightfield # ADDED: Routing for declared modality
    name: Transmitted Brightfield
    modalities:
      - transmitted_brightfield
    illumination_sequence: [] # Intentionally empty as no specific transmitted source is documented
    detection_sequence:
      - optical_path_element_id: trinocular_port_selector
      - branches:
          selection_mode: exclusive
          items:
            - branch_id: to_k3c
              label: "To K3C CMOS"
              sequence:
                - endpoint_id: detector_2
            - branch_id: to_eyepieces 
              label: "To Eyepieces"
              sequence:
                - endpoint_id: eyepieces
