instrument:
  display_name: Leica Thunder
  instrument_id: scope-leica-thunder
  manufacturer: Leica Microsystems
  model: Leica THUNDER Imager 3D Live Cell
  year_of_purchase: '2023'
  funding: ''
  stand_orientation: inverted
  ocular_availability: trinocular
  location: '' # Flag: Required field. Please provide the physical location.
  notes: Widefield microscope with Leica Computational Clearing for real-time out-of-focus blur removal in 3D fluorescence imaging; high sensitivity supports low phototoxicity and photobleaching. LAS X raw data is saved separately; processing can be done during acquisition or by post-processing.
  url: https://www.leica-microsystems.com/products/thunder-imaging-systems/

modalities:
  - widefield_fluorescence
  - transmitted_brightfield

modules:
  - name: hardware_autofocus
    notes: ''
    url: ''

software:
  - role: acquisition
    name: LAS X with Navigator
    version: ''
    url: https://www.leica-microsystems.com/products/microscope-software/p/leica-las-x-ls/
hardware:
  environment:
    temperature_control: true
    co2_control: true
    humidity_control: true
    
  scanner:
    type: none
    notes: ''
    url: ''

  hardware_autofocus:
    is_installed: true
    type: infrared_reflection 

  light_sources:
