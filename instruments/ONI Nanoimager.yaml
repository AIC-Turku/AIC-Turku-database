instrument:
  display_name: ONI Nanoimager
  instrument_id: scope-oni-nanoimager
  manufacturer: ONI
  model: Nanoimager
  year_of_purchase: '2022'
  funding: ''
  stand_orientation: other
  ocular_availability: camera_only
  location: '' # Flag: Required field. Please provide the physical location.
  notes: "Super-resolution microscope (compact). Imaging modes: Single-molecule localization microscopy (2D & 3D SMLM), Single-particle tracking (3D SPT), TIRF imaging, FRET imaging. Field of view: 50 \u03BCm x 80 \u03BCm per channel. Simultaneous 2-channel imaging (<10 nm mapping accuracy). Equipped with a closed-loop piezo stage (20/20/10 mm XYZ travel, 1 nm resolution) and continuous/one-shot autofocus."
  url: https://oni.bio/nanoimager

modalities:
  - tirf
  - smlm
  - spt
  - fret

modules:
  - name: environmental_enclosure
    notes: "Resistive heating without active cooling. Suitable for live cell imaging at 37\xB0C."
    url: ''
  - name: piezo_z_stage # Flag: Extracted from instrument notes. Verify this matches a canonical ID in vocab/modules.yaml
    notes: "Closed-loop piezo stage (20/20/10 mm XYZ travel, 1 nm resolution)"
    url: ''
  - name: hardware_autofocus # Flag: Extracted from instrument notes. Verify this matches a canonical ID in vocab/modules.yaml
    notes: "Continuous/one-shot autofocus"
    url: ''

software:
  - role: acquisition
    name: NimOS microscope control software
    version: ''
    url: ''
  - role: processing
    name: CODI analysis software
    version: ''
    url: ''
hardware:
  environment:
    temperature_control: true # Flag: Conditionally required due to 'environmental_enclosure' module.
    notes: "Resistive heating without active cooling. Suitable for live cell imaging at 37\xB0C."

  hardware_autofocus:
    is_installed: true
    type: infrared_reflection # Flag: Verify this matches a canonical ID in vocab/autofocus_types.yaml

  stages:
    - type: piezo # Flag: Verify this matches a canonical ID in vocab/stage_types.yaml
      notes: "Closed-loop piezo stage (20/20/10 mm XYZ travel, 1 nm resolution)"

  scanner:
    type: none
    notes: ''
    url: ''

  light_sources:
    - kind: laser
      manufacturer: ONI
      model: 405 nm violet
      technology: diode
      wavelength_nm: '405'
      power: 70 mW
      notes: Power measured at the objective.
      url: ''
    - kind: laser
      manufacturer: ONI
      model: 488 nm blue
      technology: diode
      wavelength_nm: '488'
      power: 250 mW
      notes: Power measured at the objective.
      url: ''
    - kind: laser
      manufacturer: ONI
      model: 561 nm green
      technology: dpss
      wavelength_nm: '561'
      power: 250 mW
      notes: Power measured at the objective. DPSS technology inherently takes ~30 sec to stabilize.
      url: ''
    - kind: laser
      manufacturer: ONI
      model: 640 nm red
      technology: diode
      wavelength_nm: '640'
      power: 220 mW
      notes: Power measured at the objective.
      url: ''

  detectors:
    - kind: scmos
      manufacturer: Hamamatsu
      model: ORCA-Flash4.0 V3
      pixel_pitch_um: 6.5 # Flag: Strictly required by schema for scmos. Standard specification for this camera.
      notes: Digital sCMOS camera, 100 fps full frame. Typically operated with 2x2 binning.
      url: ''

  filters:
    - name: Channel 0 Dual-band
      location: Internal
      product_code: ''
      excitation: '' # Flag: Required because 'tirf' is present.
      dichroic: ''   # Flag: Required because 'tirf' is present.
      emission: 498-551; 576-620 # Flag: Check if your spectral_descriptor validation accepts this format.
      notes: ''
      url: ''
    - name: Channel 1
      location: Internal
      product_code: ''
      excitation: '' # Flag: Required field.
      dichroic: ''   # Flag: Required field.
      emission: 665-705 # Flag: Check if your spectral_descriptor validation accepts this format.
      notes: ''
      url: ''

  objectives:
    - id: 100x_oil
      manufacturer: Olympus
      model: UPLXAPO100XO
      product_code: ''
      magnification: 100.0
      numerical_aperture: 1.45
      working_distance: 0.13 mm
      immersion: oil
      correction: apochromat
      afc_compatible: true
      specialties: []
      notes: ''
      url: ''
      is_installed: true

  magnification_changers:
    - manufacturer: ONI
      model: Custom tube lens
      magnification: 1.1
      notes: Custom tube lens provides 110x total magnification with the 100x objective. Combined with 2x2 binning, this yields a pixel size of ~117 nm.
      url: ''
