instrument:
  display_name: ONI Nanoimager
  instrument_id: scope-oni-nanoimager
  manufacturer: ONI
  model: Nanoimager
  year_of_purchase: '2022'
  funding: ''
  stand_orientation: other
  ocular_availability: camera_only
  location: ''
  notes: 'Super-resolution microscope (compact). Imaging modes: Single-molecule localization microscopy (2D & 3D SMLM), Single-particle tracking (3D SPT), TIRF imaging, FRET imaging. Field of view: 50 μm x 80 μm per channel. Simultaneous 2-channel imaging (<10 nm mapping accuracy). Equipped with a closed-loop piezo stage (20/20/10 mm XYZ travel, 1 nm resolution) and continuous/one-shot autofocus.'
  url: https://oni.bio/nanoimager

modalities:
  - tirf
  - smlm
  - spt
  - fret

modules:
  - type: environmental_enclosure # CORRECTED: Changed 'name' to the canonical 'type'
    notes: Resistive heating without active cooling. Suitable for live cell imaging at 37°C.
    url: ''
    manufacturer: ONI
    model: Environmental Enclosure
  - type: piezo_z_stage # CORRECTED
    notes: Closed-loop piezo stage (20/20/10 mm XYZ travel, 1 nm resolution)
    url: ''
    manufacturer: ONI
    model: Closed-loop Piezo XYZ Stage
  - type: hardware_autofocus # CORRECTED
    notes: Continuous/one-shot autofocus
    url: ''
    manufacturer: ONI
    model: Continuous/One-shot Autofocus

software:
  - role: acquisition
    name: NimOS microscope control software
    version: ''
    url: ''
  - role: processing
    name: CODI analysis software
    version: ''
    url: ''

hardware:
  environment:
    temperature_control: true
    notes: Resistive heating without active cooling. Suitable for live cell imaging at 37°C.
    
  hardware_autofocus:
    is_installed: true
    type: infrared_reflection
    
  stages:
    - type: piezo_z_stage # CORRECTED: Changed from non-standard 'z_piezo'
      manufacturer: ONI # ADDED: Required for completeness
      model: Closed-loop Piezo XYZ Stage
      notes: Closed-loop piezo stage (20/20/10 mm XYZ travel, 1 nm resolution)
      
  scanner:
    type: none
    notes: ''
    url: ''
    
  detectors:
    - kind: scmos
      manufacturer: Hamamatsu
      model: ORCA-Flash4.0 V3
      pixel_pitch_um: 6.5
      qe_peak_pct: 82 # ADDED: Strictly required for SMLM modalities
      notes: Digital sCMOS camera, 100 fps full frame. Typically operated with 2x2 binning.
      url: ''
      id: detector_1

  # CORRECTED: Removed the deprecated hardware.filters array

  objectives:
    - id: 100x_oil
      manufacturer: Olympus
      model: UPLXAPO100XO
      product_code: ''
      magnification: 100.0
      numerical_aperture: 1.45
      working_distance: 0.13 mm
      immersion: oil
      correction: apochromat
      afc_compatible: true
      specialties: []
      notes: ''
      url: ''
      is_installed: true
      
  magnification_changers:
    - manufacturer: ONI
      model: Custom tube lens
      magnification: 1.1
      notes: Custom tube lens provides 110x total magnification with the 100x objective. Combined with 2x2 binning, this yields a pixel size of ~117 nm.
      url: ''
      
  sources:
    - kind: laser
      manufacturer: ONI
      model: 405 nm violet
      technology: diode
      wavelength_nm: 405 # CORRECTED: Converted from string to integer
      power: 70 mW
      notes: Power measured at the objective.
      url: ''
      id: 405_nm_violet
      modalities: # CORRECTED: Aligned modalities with standard definitions
        - tirf
        - smlm
        - spt
        - fret
      # CORRECTED: Removed legacy 'path: epi' alias
    - kind: laser
      manufacturer: ONI
      model: 488 nm blue
      technology: diode
      wavelength_nm: 488
      power: 250 mW
      notes: Power measured at the objective.
      url: ''
      id: 488_nm_blue
      modalities:
        - tirf
        - smlm
        - spt
        - fret
    - kind: laser
      manufacturer: ONI
      model: 561 nm green
      technology: dpss
      wavelength_nm: 561
      power: 250 mW
      notes: Power measured at the objective. DPSS technology inherently takes ~30 sec to stabilize.
      url: ''
      id: 561_nm_green
      modalities:
        - tirf
        - smlm
        - spt
        - fret
    - kind: laser
      manufacturer: ONI
      model: 640 nm red
      technology: diode
      wavelength_nm: 640
      power: 220 mW
      notes: Power measured at the objective.
      url: ''
      id: 640_nm_red
      modalities:
        - tirf
        - smlm
        - spt
        - fret
        
  optical_path_elements:
    - name: Internal Emission Splitter # CORRECTED: Converted legacy filters array into a canonical splitter
      stage_role: splitter
      id: internal_emission_splitter
      element_type: splitter
      selection_mode: concurrent
      modalities:
        - tirf
        - smlm
        - spt
        - fret
      supported_branch_modes:
        - concurrent
      supported_branch_count: 2
      notes: 'Simultaneous 2-channel imaging. Splits emission onto two halves of the single camera chip.'
      positions:
        Pos_1:
          name: Channel 0 & 1 Splitting Optics
          component_type: multiband_bandpass
          bands: # CORRECTED: Converted string ranges into canonical center/width numeric arrays
            - center_nm: 524.5
              width_nm: 53 # Maps to 498-551 nm
            - center_nm: 598
              width_nm: 44 # Maps to 576-620 nm
            - center_nm: 685
              width_nm: 40 # Maps to 665-705 nm
          notes: 'Channel 0 Dual-band (approx 498-551 nm; 576-620 nm) and Channel 1 (approx 665-705 nm).'

  # CORRECTED: Removed deprecated hardware.endpoints array

light_paths:
  - id: smlm_tirf # CORRECTED: Aligned ID with documented modalities
    name: SMLM / TIRF / SPT / FRET
    illumination_sequence:
      - source_id: 405_nm_violet
      - source_id: 488_nm_blue
      - source_id: 561_nm_green
      - source_id: 640_nm_red
    detection_sequence:
      - optical_path_element_id: internal_emission_splitter
      - branches: # ADDED: Required detection routing to valid endpoints
          selection_mode: concurrent
          items:
            - branch_id: to_channel_0
              label: "Channel 0 (Green/Red - Left Half of Sensor)"
              sequence:
                - endpoint_id: detector_1
            - branch_id: to_channel_1
              label: "Channel 1 (Far-Red - Right Half of Sensor)"
              sequence:
                - endpoint_id: detector_1
