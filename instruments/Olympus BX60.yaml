  sources:
  - kind: halogen_lamp
    manufacturer: Olympus
    model: 12V 100W halogen bulb
    power: 100 W
    role: transmitted_illumination
    notes: Transmitted brightfield and phase contrast source. Broadband illumination.
    url: ''
    id: 12v_100w_halogen_bulb
    modalities:
    - transmitted_brightfield
    - phase_contrast
  - kind: arc_lamp
    manufacturer: Osram
    model: HBO 103W short arc bulb
    power: 103 W
    notes: Fluorescence excitation source. Broadband illumination.
    url: ''
    id: hbo_103w_short_arc_bulb
    modalities:
    - widefield_fluorescence
  optical_path_elements:
  - name: Fluorescence Turret
    stage_role: cube
    id: fluorescence_turret
    element_type: turret
    modalities:
    - widefield_fluorescence
    positions:
      Pos_1:
        name: U-MWU (DAPI)
        product_code: U-MWU
        component_type: filter_cube
        cut_on_nm:
        - 420
        notes: 'Excitation: 355/50 nm. Dichroic Cutoff: 400 nm.'
        excitation_filter:
          component_type: bandpass
          center_nm: 355
          width_nm: 50
        dichroic:
          component_type: dichroic
          cut_on_nm: 400
        emission_filter:
          component_type: longpass
          cut_on_nm: 420
      Pos_2:
        name: U-MWIB (GFP wide)
        product_code: U-MWIB
        component_type: filter_cube
        cut_on_nm:
        - 515
        notes: 'Excitation: 475/30 nm. Dichroic Cutoff: 505 nm.'
        excitation_filter:
          component_type: bandpass
          center_nm: 475
          width_nm: 30
        dichroic:
          component_type: dichroic
          cut_on_nm: 505
        emission_filter:
          component_type: longpass
          cut_on_nm: 515
      Pos_3:
        name: U-MWIG (Alexa 546 / TRITC)
        product_code: U-MWIG
        component_type: filter_cube
        cut_on_nm:
        - 580
        notes: 'Excitation: 535/30 nm. Dichroic Cutoff: 565 nm.'
        excitation_filter:
          component_type: bandpass
          center_nm: 535
          width_nm: 30
        dichroic:
          component_type: dichroic
          cut_on_nm: 565
        emission_filter:
          component_type: longpass
          cut_on_nm: 580
      Pos_4:
        name: U-MNIBA2 (GFP narrow)
        product_code: U-MNIBA2
        component_type: filter_cube
        bands:
        - center_nm: 530
          width_nm: 40
        notes: 'Optional filter cube. Excitation: 480/20 nm. Dichroic Cutoff: 505
          nm.'
        excitation_filter:
          component_type: bandpass
          center_nm: 480
          width_nm: 20
        dichroic:
          component_type: dichroic
          cut_on_nm: 505
        emission_filter:
          component_type: bandpass
          center_nm: 530
          width_nm: 40
  - name: Trinocular Port
    stage_role: splitter
    id: trinocular_port
    element_type: splitter
    selection_mode: exclusive
    modalities:
    - widefield_fluorescence
    - transmitted_brightfield
    - phase_contrast
    supported_branch_modes:
    - selected
    supported_branch_count: 2
    notes: Splits light between the eyepieces and the camera.
light_paths:
- id: widefield_fluorescence
  name: Epi-fluorescence
  illumination_sequence:
  - source_id: hbo_103w_short_arc_bulb
  - optical_path_element_id: fluorescence_turret
  detection_sequence:
  - optical_path_element_id: fluorescence_turret
  - optical_path_element_id: trinocular_port
  - branches:
      selection_mode: exclusive
      items:
      - branch_id: to_camera
        label: To DP71 Camera
        sequence:
        - endpoint_id: detector_1
      - branch_id: to_eyepieces
        label: To Eyepieces
        sequence:
        - endpoint_id: eyepieces
  route_type: widefield_fluorescence
- id: transmitted_brightfield
  name: Transmitted Brightfield
  illumination_sequence:
  - source_id: 12v_100w_halogen_bulb
  detection_sequence:
  - optical_path_element_id: trinocular_port
  - branches:
      selection_mode: exclusive
      items:
      - branch_id: to_camera
        label: To DP71 Camera
        sequence:
        - endpoint_id: detector_1
      - branch_id: to_eyepieces
        label: To Eyepieces
        sequence:
        - endpoint_id: eyepieces
  route_type: transmitted_brightfield
- id: phase_contrast
  name: Phase Contrast
  illumination_sequence:
  - source_id: 12v_100w_halogen_bulb
  detection_sequence:
  - optical_path_element_id: trinocular_port
  - branches:
      selection_mode: exclusive
      items:
      - branch_id: to_camera
        label: To DP71 Camera
        sequence:
        - endpoint_id: detector_1
      - branch_id: to_eyepieces
        label: To Eyepieces
        sequence:
        - endpoint_id: eyepieces
  route_type: phase_contrast
  notes: Shares the same documented physical path as transmitted_brightfield; phase contrast is supported by the halogen lamp source, which explicitly lists phase_contrast in its modalities.
