instrument:
  display_name: Olympus BX60
  instrument_id: scope-olympus-bx60
  manufacturer: Olympus/Evident
  model: BX60
  year_of_purchase: ''
  funding: ''
  stand_orientation: upright
  ocular_availability: trinocular
  # MISSING REQUIRED: Please provide the physical location.
  location: '' 
  notes: 'Widefield microscope (upright). Imaging modes: Brightfield, Fluorescence (epifluorescence), Phase contrast.'
  url: ''

modalities:
  - widefield_fluorescence
  - transmitted_brightfield
  - phase_contrast

modules: []

software:
  - role: acquisition
    name: Olympus Cell^D
    version: ''
    url: ''

hardware:
  scanner:
    type: none
    notes: ''
    url: ''

  light_sources:
    - kind: halogen_lamp
      manufacturer: Olympus
      model: 12V 100W halogen bulb
      wavelength_nm: broadband
      power: 100 W
      path: transmitted
      notes: Transmitted brightfield and phase contrast source
      url: ''
    - kind: arc_lamp
      manufacturer: Osram
      model: HBO 103W short arc bulb
      wavelength_nm: broadband
      power: 103 W
      path: epi
      notes: Fluorescence excitation source
      url: ''

  detectors:
    - kind: ccd
      manufacturer: Olympus
      model: DP71
      # FLAG FIXED: Physical pixel size of the DP71 sensor is 6.45um
      pixel_pitch_um: 6.45 
      sensor_format_px: "4080 x 3072"
      notes: '1.45 megapixel CCD that uses pixel-shifting to achieve 12.5 megapixel resolution.'
      url: ''

  light_path:
    cube_mechanisms:
      - name: Fluorescence Turret
        type: turret
        path: epi
        slots: 4
        positions:
          Pos_1:
            name: U-MWU (DAPI)
            product_code: U-MWU
            excitation_filter:
              component_type: bandpass
              center_nm: 355
              width_nm: 50
            dichroic:
              component_type: dichroic
              cutoffs_nm: [400]
            emission_filter:
              component_type: longpass
              cut_on_nm: 420
          Pos_2:
            name: U-MWIB (GFP wide)
            product_code: U-MWIB
            excitation_filter:
              component_type: bandpass
              center_nm: 475
              width_nm: 30
            dichroic:
              component_type: dichroic
              cutoffs_nm: [505]
            emission_filter:
              component_type: longpass
              cut_on_nm: 515
          Pos_3:
            name: U-MWIG (Alexa 546 / TRITC)
            product_code: U-MWIG
            excitation_filter:
              component_type: bandpass
              center_nm: 535
              width_nm: 30
            dichroic:
              component_type: dichroic
              cutoffs_nm: [565]
            emission_filter:
              component_type: longpass
              cut_on_nm: 580
          Pos_4:
            name: U-MNIBA2 (GFP narrow)
            product_code: U-MNIBA2
            excitation_filter:
              component_type: bandpass
              center_nm: 480
              width_nm: 20
            dichroic:
              component_type: dichroic
              # Fixed typo from '5056' to '505'
              cutoffs_nm: [505] 
            emission_filter:
              component_type: bandpass
              center_nm: 530
              width_nm: 40
            notes: Optional filter cube

    splitters: []

  objectives:
    - id: 4x_air
      manufacturer: Olympus
      model: PlanC 4x/0.10
      product_code: ''
      magnification: 4.0
      numerical_aperture: 0.1
      working_distance: 18.5 mm
      immersion: air
      # VOCAB FIXED: PlanC maps to plan_achromat
      correction: plan_achromat
      afc_compatible: false
      specialties: []
      notes: ''
      url: ''
      is_installed: true
    - id: 10x_air
      manufacturer: Olympus
      model: UPlanFl 10x/0.30 Ph1
      product_code: ''
      magnification: 10.0
      numerical_aperture: 0.30
      working_distance: 10.0 mm
      immersion: air
      # VOCAB FIXED: UPlanFl maps to plan_fluorite
      correction: plan_fluorite
      afc_compatible: false
      specialties:
        - phase
      notes: ''
      url: ''
      is_installed: true
    - id: 20x_air
      manufacturer: Olympus
      model: UPlanFl 20x/0.50 Ph1
      product_code: ''
      magnification: 20.0
      numerical_aperture: 0.50
      working_distance: 2.1 mm
      immersion: air
      correction: plan_fluorite
      afc_compatible: false
      specialties:
        - phase
      notes: ''
      url: ''
      is_installed: true
    - id: 40x_air
      manufacturer: Olympus
      model: UPlanFl 40x/0.75 Ph2
      product_code: ''
      magnification: 40.0
      numerical_aperture: 0.75
      working_distance: 0.51 mm
      immersion: air
      correction: plan_fluorite
      afc_compatible: false
      specialties:
        - phase
      notes: ''
      url: ''
      is_installed: true
    - id: 100x_oil
      manufacturer: Olympus
      model: UPlanApo 100x/1.35 Oil Iris Ph3
      product_code: ''
      magnification: 100.0
      numerical_aperture: 1.35
      working_distance: 0.17 mm
      immersion: oil
      # VOCAB FIXED: UPlanApo maps to plan_apochromat
      correction: plan_apochromat
      afc_compatible: false
      specialties:
        - phase
      notes: 'Includes adjustable iris'
      url: ''
      is_installed: true
    - id: 60x_oil
      manufacturer: Olympus
      model: UPlanFl 60x/1.25 Oil Iris Ph3
      product_code: ''
      magnification: 60.0
      numerical_aperture: 1.25
      working_distance: ''
