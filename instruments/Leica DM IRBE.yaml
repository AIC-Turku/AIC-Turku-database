# -----------------------------------------------------------------------------
# MICROSCOPE CONFIGURATION: Leica DM IRBE
# -----------------------------------------------------------------------------
instrument:
  display_name: "Leica DM IRBE"
  instrument_id: "scope-leica-dm-irbe"
  manufacturer: "Leica Microsystems"
  model: "Leica DM IRBE"
  year_of_purchase: ""
  funding: ""
  stand_orientation: "inverted"
  location: "BioCity, 2nd floor, room 2076"
  notes: "Inverted microscope with camera port. Current imaging modes are widefield fluorescence, transmitted brightfield, and phase contrast. Optional 1.6x auxiliary lens in microscope body."
  url: ""

# -----------------------------------------------------------------------------
# IMAGING MODALITIES
# -----------------------------------------------------------------------------
