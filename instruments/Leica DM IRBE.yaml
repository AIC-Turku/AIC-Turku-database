  magnification_changers:
  - manufacturer: Leica
    model: 1.6x Auxiliary Lens
    magnification: 1.6
    notes: Optional 1.6x auxiliary lens in microscope body.
    url: ''
  sources:
  - kind: halogen_lamp
    manufacturer: Leica
    model: 12V 100W halogen bulb
    wavelength_nm: broadband
    power: 100 W
    path: transmitted
    role: transmitted_illumination
    notes: Transmitted light source for BF, DF, and PH
    url: ''
    id: 12v_100w_halogen_bulb
    modalities:
    - transmitted
  - kind: arc_lamp
    manufacturer: Leica
    model: 50W HBO short arc bulb
    wavelength_nm: broadband
    power: 50 W
    path: epi
    notes: Fluorescence excitation source
    url: ''
    id: 50w_hbo_short_arc_bulb
    modalities:
    - epi
  optical_path_elements:
  - name: Fluorescence Turret
    type: turret
    path: epi
    slots: 3
    positions:
      Pos_1:
        name: Filter Cube A (DAPI/Hoechst)
        excitation_filter:
          component_type: bandpass
          center_nm: 360
          width_nm: 40
        dichroic:
          component_type: dichroic
          cutoffs_nm:
          - 400
        emission_filter:
          component_type: longpass
          cut_on_nm: 425
      Pos_2:
        name: Filter Cube EGFP
        excitation_filter:
          component_type: bandpass
          center_nm: 470
          width_nm: 40
        dichroic:
          component_type: dichroic
          cutoffs_nm:
          - 495
        emission_filter:
          component_type: bandpass
          center_nm: 525
          width_nm: 50
      Pos_3:
        name: Filter Cube CY3 (TRITC/RFP)
        excitation_filter:
          component_type: bandpass
          center_nm: 545.5
          width_nm: 25
        dichroic:
          component_type: dichroic
          cutoffs_nm:
          - 565
        emission_filter:
          component_type: bandpass
          center_nm: 605
          width_nm: 70
    stage_role: cube
    id: fluorescence_turret
    element_type: turret
    modalities:
    - epi
  - name: Camera Port
    type: emission_splitter
    path: epi
    notes: Port for standalone camera system (no computer required); image storage
      via USB memory device.
    branches:
    - id: camera_port_primary
      label: Camera Port Path
      mode: transmitted
      component:
        component_type: passthrough
      target_ids:
      - camera_port_main
    stage_role: splitter
    id: camera_port
    element_type: emission_splitter
    selection_mode: fixed
    modalities:
    - epi
    - transmitted
  endpoints:
  - id: camera_port_main
    endpoint_type: camera_port
    display_label: Camera Port
    path: shared
light_paths:
- id: epi
  name: Epi-fluorescence
  illumination_sequence:
  - source_id: 50w_hbo_short_arc_bulb
  - optical_path_element_id: fluorescence_turret
  detection_sequence:
  - optical_path_element_id: fluorescence_turret
  - optical_path_element_id: camera_port
- id: transmitted
  name: Transmitted light
  illumination_sequence:
  - source_id: 12v_100w_halogen_bulb
  detection_sequence:
  - optical_path_element_id: camera_port
