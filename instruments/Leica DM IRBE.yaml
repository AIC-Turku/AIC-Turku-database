instrument:
  display_name: Leica DM IRBE
  instrument_id: scope-leica-dm-irbe
  manufacturer: Leica Microsystems
  model: Leica DM IRBE
  year_of_purchase: ''
  funding: ''
  stand_orientation: inverted
  ocular_availability: trinocular
  location: BioCity, 2nd floor, room 2076
  notes: 'Inverted microscope with camera port. Current imaging modes are widefield fluorescence, transmitted brightfield, darkfield, and phase contrast. Optional 1.6x auxiliary lens in microscope body.'
  url: ''

modalities:
  - widefield_fluorescence
  - transmitted_brightfield
  - phase_contrast
  - darkfield

modules: []
software_status: not_applicable
software: []

hardware:
  scanner:
    type: none
    notes: ''
    url: ''
    
  detectors:
    - kind: ccd 
      manufacturer: Unknown
      model: Unknown Camera
      notes: Standalone camera system attached to port (no computer required); image storage via USB memory device.
      id: camera_port_main

  eyepieces: # ADDED: Required for trinocular routing
    - id: eyepieces
      notes: 'Binocular Eyepieces'
      
  objectives:
    - id: 10x_air
      manufacturer: Leica
      model: PL FLUOTAR 10x/0.30 PH1
      product_code: '506010'
      magnification: 10.0
      numerical_aperture: 0.3
      working_distance: ''
      immersion: air
      correction: plan_fluorite
      afc_compatible: false
      specialties:
        - phase
      notes: ''
      url: ''
      is_installed: true
    - id: 20x_air
      manufacturer: Leica
      model: PL FLUOTAR 20x/0.50 PH2
      product_code: '506013'
      magnification: 20.0
      numerical_aperture: 0.5
      working_distance: ''
      immersion: air
      correction: plan_fluorite
      afc_compatible: false
      specialties:
        - phase
      notes: ''
      url: ''
      is_installed: true
    - id: 40x_air
      manufacturer: Leica
      model: PL FLUOTAR 40x/0.70 PH2
      product_code: '506014'
      magnification: 40.0
      numerical_aperture: 0.7
      working_distance: ''
      immersion: air
      correction: plan_fluorite
      afc_compatible: false
      specialties:
        - phase
      notes: ''
      url: ''
      is_installed: true
    - id: 63x_air
      manufacturer: Leica
      model: PL FLUOTAR 63x/0.70 CORR PH2
      product_code: '506062'
      magnification: 63.0
      numerical_aperture: 0.7
      working_distance: ''
      immersion: air
      correction: plan_fluorite
      afc_compatible: false
      specialties:
        - phase
        - correction_collar
      notes: ''
      url: ''
      is_installed: true
      
  magnification_changers:
    - manufacturer: Leica
      model: 1.6x Auxiliary Lens
      magnification: 1.6
      notes: Optional 1.6x auxiliary lens in microscope body.
      url: ''
      
  sources:
    - kind: halogen_lamp
      manufacturer: Leica
      model: 12V 100W halogen bulb
      power: 100 W
      role: transmitted_illumination
      notes: Transmitted light source for BF, DF, and PH. Broadband illumination.
      url: ''
      id: 12v_100w_halogen_bulb
      modalities:
        - transmitted_brightfield
    - kind: arc_lamp
      manufacturer: Leica
      model: 50W HBO short arc bulb
      power: 50 W
      notes: Fluorescence excitation source. Broadband illumination.
      url: ''
      id: 50w_hbo_short_arc_bulb
      modalities:
        - widefield_fluorescence
        
  optical_path_elements:
    - name: Fluorescence Turret
      stage_role: cube
      id: fluorescence_turret
      element_type: turret
      modalities:
        - widefield_fluorescence
      positions:
        Pos_1:
          name: Filter Cube A (DAPI/Hoechst)
          component_type: filter_cube
          cut_on_nm:
            - 425
          notes: 'Excitation: 360/40 nm. Dichroic Cutoff: 400 nm.'
          excitation_filter:
            component_type: bandpass
            center_nm: 360
            width_nm: 40
          dichroic:
            component_type: dichroic
            cut_on_nm: 400
          emission_filter:
            component_type: longpass
            cut_on_nm: 425
        Pos_2:
          name: Filter Cube EGFP
          component_type: filter_cube
          bands:
            - center_nm: 525
              width_nm: 50
          notes: 'Excitation: 470/40 nm. Dichroic Cutoff: 495 nm.'
          excitation_filter:
            component_type: bandpass
            center_nm: 470
            width_nm: 40
          dichroic:
            component_type: dichroic
            cut_on_nm: 495
          emission_filter:
            component_type: bandpass
            center_nm: 525
            width_nm: 50
        Pos_3:
          name: Filter Cube CY3 (TRITC/RFP)
          component_type: filter_cube
          bands:
            - center_nm: 605
              width_nm: 70
          notes: 'Excitation: 545.5/25 nm. Dichroic Cutoff: 565 nm.'
          excitation_filter:
            component_type: bandpass
            center_nm: 545.5
            width_nm: 25
          dichroic:
            component_type: dichroic
            cut_on_nm: 565
          emission_filter:
            component_type: bandpass
            center_nm: 605
            width_nm: 70
          
    - name: Trinocular Port # CORRECTED: Changed label to reflect its trinocular splitting role
      stage_role: splitter
      id: camera_port
      element_type: splitter
      selection_mode: exclusive
      modalities:
        - widefield_fluorescence
        - transmitted_brightfield
      supported_branch_modes:
        - selected
      supported_branch_count: 2 # CORRECTED: Increased to 2 for camera + eyepieces
      notes: Splits light between eyepieces and camera port.

light_paths:
  - id: widefield_fluorescence
    name: Epi-fluorescence
    modalities:
      - widefield_fluorescence
    illumination_sequence:
      - source_id: 50w_hbo_short_arc_bulb
      - optical_path_element_id: fluorescence_turret
    detection_sequence:
      - optical_path_element_id: fluorescence_turret
      - optical_path_element_id: camera_port
      - branches:
          selection_mode: exclusive
          items:
            - branch_id: to_camera
              label: "To Camera Port"
              sequence:
                - endpoint_id: camera_port_main
            - branch_id: to_eyepieces # ADDED: Eyepiece branch
              label: "To Eyepieces"
              sequence:
                - endpoint_id: eyepieces
                
  - id: transmitted_brightfield
    name: Transmitted light
    modalities:
      - transmitted_brightfield
      - phase_contrast
      - darkfield
    illumination_sequence:
      - source_id: 12v_100w_halogen_bulb
    detection_sequence:
      - optical_path_element_id: camera_port
      - branches:
          selection_mode: exclusive
          items:
            - branch_id: to_camera
              label: "To Camera Port"
              sequence:
                - endpoint_id: camera_port_main
            - branch_id: to_eyepieces # ADDED: Eyepiece branch
              label: "To Eyepieces"
              sequence:
                - endpoint_id: eyepieces
