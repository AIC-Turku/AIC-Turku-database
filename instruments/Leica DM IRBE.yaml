  model: Leica DM IRBE
  year_of_purchase: ''
  funding: ''
  stand_orientation: inverted
  ocular_availability: trinocular
  location: BioCity, 2nd floor, room 2076
  notes: Inverted microscope with camera port. Current imaging modes are widefield
