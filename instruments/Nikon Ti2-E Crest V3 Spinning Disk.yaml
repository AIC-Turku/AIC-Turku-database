  optical_path_elements:
    - name: Epi Turret
      stage_role: cube
      id: epi_turret
      element_type: turret
      modalities:
        - widefield_fluorescence
      positions:
        Pos_1:
          name: DAPI Ti2 32mm Cube SB LFOV
          product_code: MXR00714
          component_type: filter_cube # CORRECTED: Flattened filter components into cube + notes
          bands:
            - center_nm: 447
              width_nm: 60
          notes: 'For widefield imaging with D-LEDI. Excitation: 377/50 nm. Dichroic Cutoff: 409 nm.'
        Pos_2:
          name: FITC Ti2 32mm Cube SB LFOV
          product_code: MXR00716
          component_type: filter_cube
          bands:
            - center_nm: 525
              width_nm: 50
          notes: 'Excitation: 470/40 nm. Dichroic Cutoff: 495 nm.'
        Pos_3:
          name: mCherry Ti2 32mm Cube SB LFOV
          product_code: MXR00719
          component_type: filter_cube
          bands:
            - center_nm: 630
              width_nm: 75
          notes: 'Excitation: 560/40 nm. Dichroic Cutoff: 585 nm.'
        Pos_4:
          name: Cy5 Ti2 32mm Cube SB LFOV
          product_code: MXR00720
          component_type: filter_cube
          bands:
            - center_nm: 700
              width_nm: 75
          notes: 'Excitation: 620/60 nm. Dichroic Cutoff: 660 nm.'
          
    - name: Crest Excitation Wheel
      slots: 3
      stage_role: excitation
      id: crest_excitation_wheel
      element_type: filter_wheel
      modalities:
        - confocal_spinning_disk
      positions:
        Pos_1:
          name: Celesta-DA/FI/TR/Cy5/Cy7-A
          component_type: multiband_bandpass
          product_code: MXR00543
          bands:
            - center_nm: 391
              width_nm: 54.4
            - center_nm: 477
              width_nm: 20.4
            - center_nm: 549
              width_nm: 25.7
            - center_nm: 638.5
              width_nm: 27.6
            - center_nm: 741
              width_nm: 45.1
        Pos_2:
          name: Celesta CFP-YFP-A
          component_type: multiband_bandpass
          product_code: MXR00544
          bands:
            - center_nm: 449
              width_nm: 26.7
            - center_nm: 520
              width_nm: 27.9
        Pos_3:
          name: Neutral Density
          component_type: neutral_density
          notes: ND 1.3-5%T-25mm. 5% transmission to be used with widefield.
          
    - name: Crest Dichroic Wheel
      slots: 2
      stage_role: dichroic
      id: crest_dichroic_wheel
      element_type: filter_wheel
      modalities:
        - confocal_spinning_disk
      positions:
        Pos_1:
          name: Celesta-DA/FI/TR/Cy5/Cy7-A
          component_type: multiband_dichroic
          product_code: MXR00543
          bands: # CORRECTED: Consolidated transmission/reflection lists into standard bands
            - center_nm: 441
              width_nm: 36.1
            - center_nm: 511
              width_nm: 34.3
            - center_nm: 592.5
              width_nm: 45.2
            - center_nm: 684
              width_nm: 44.4
            - center_nm: 817
              width_nm: 78.8
          notes: 'Explicit transmission windows are mapped. Reflection cutoffs: 421, 491, 567, 659, 776 nm.'
        Pos_2:
          name: Celesta CFP-YFP-A
          component_type: multiband_dichroic
          product_code: MXR00544
          bands:
            - center_nm: 484
              width_nm: 25.9
            - center_nm: 561
              width_nm: 38.9
          notes: 'Explicit transmission windows are mapped. Reflection cutoffs: 471, 539 nm.'
          
    - name: Crest Emission Wheel
      slots: 8
      stage_role: emission
      id: crest_emission_wheel
      element_type: filter_wheel
      modalities:
        - confocal_spinning_disk
      positions:
        Pos_1:
          name: Celesta-DA/FI/TR/Cy5/Cy7-A
          component_type: multiband_bandpass
          product_code: MXR00541 / MXR00543
          bands:
            - center_nm: 441
              width_nm: 36.1
            - center_nm: 511
              width_nm: 34.3
            - center_nm: 592.5
              width_nm: 45.2
            - center_nm: 684
              width_nm: 44.4
            - center_nm: 817
              width_nm: 78.8
        Pos_2:
          name: Celesta CFP-YFP-A
          component_type: multiband_bandpass
          product_code: MXR00542 / MXR00544
          bands:
            - center_nm: 484
              width_nm: 25.9
            - center_nm: 561
              width_nm: 38.9
        Pos_3:
          component_type: bandpass
          bands:
            - center_nm: 438
              width_nm: 24
        Pos_4:
          component_type: bandpass
          bands:
            - center_nm: 485
              width_nm: 20
        Pos_5:
          component_type: bandpass
          bands:
            - center_nm: 511
              width_nm: 20
        Pos_6:
          component_type: bandpass
          bands:
            - center_nm: 560
              width_nm: 25
        Pos_7:
          component_type: bandpass
          bands:
            - center_nm: 595
              width_nm: 31
        Pos_8:
          component_type: bandpass
          bands:
            - center_nm: 685
              width_nm: 40
              
    - name: Nikon DIA
      notes: Neutral filter for assigning the light path to single camera
      supported_branch_modes:
        - selected
      supported_branch_count: 2
      stage_role: splitter
      id: nikon_dia
      element_type: splitter # CORRECTED: Replaced invalid type
      selection_mode: exclusive
      modalities:
        - transmitted_brightfield
        - widefield_fluorescence
        
    - name: MXR00547 V3 DualCam-GFP/mCherry 2 Bands Celesta Set
      notes: 'DualCam Splitter: GFP & Cy5 Channel on Master Camera; DAPI & Cy3 on Slave Camera. Transmits Green/Far-Red, Reflects Blue/Red.'
      supported_branch_modes:
        - transmitted
        - reflected
      supported_branch_count: 2
      stage_role: splitter
      id: mxr00547_v3_dualcam_gfp_mcherry_2_bands_celesta_set
      element_type: splitter
      selection_mode: multiple # Both camera branches can be active simultaneously
      modalities:
        - confocal_spinning_disk
      positions:
        Pos_1:
          component_type: multiband_dichroic
          cutoffs_nm:
            - 485
            - 560
            - 645
            
    - name: MXR00545 V3 DualCam-CFP/YFP 2 Bands Celesta Set
      notes: Additional DualCam Splitter option for CFP/YFP imaging.
      supported_branch_modes:
        - transmitted
        - reflected
      supported_branch_count: 2
      stage_role: splitter
      id: mxr00545_v3_dualcam_cfp_yfp_2_bands_celesta_set
      element_type: splitter
      selection_mode: multiple
      modalities:
        - confocal_spinning_disk
        
    - name: Trinocular Port # ADDED: Required for ocular routing
      stage_role: splitter
      id: trinocular_port
      element_type: splitter
      selection_mode: exclusive
      modalities:
        - confocal_spinning_disk
        - widefield_fluorescence
        - transmitted_brightfield
      supported_branch_modes:
        - selected
      supported_branch_count: 2

  # CORRECTED: Removed the deprecated hardware.endpoints block.

light_paths:
  - id: confocal_spinning_disk # CORRECTED: Aligned ID with standard modalities
    name: Confocal
    modalities:
      - confocal_spinning_disk
    illumination_sequence:
      - source_id: celesta_7ch_with_despeckler
      - source_id: celesta_7ch
      - source_id: celesta_7ch_3
      - source_id: celesta_7ch_4
      - source_id: celesta_7ch_5
      - source_id: celesta_7ch_6
      - source_id: celesta_7ch_7
      - optical_path_element_id: crest_excitation_wheel
      - optical_path_element_id: crest_dichroic_wheel
    detection_sequence:
      - optical_path_element_id: crest_dichroic_wheel
      - optical_path_element_id: crest_emission_wheel
      - optical_path_element_id: trinocular_port
      - branches:
          selection_mode: exclusive
          items:
            - branch_id: to_master
              label: "To Kinetix Master (via Dual Camera Splitter)"
              sequence:
                - optical_path_element_id: mxr00547_v3_dualcam_gfp_mcherry_2_bands_celesta_set
                - endpoint_id: kinetix_master_camera
            - branch_id: to_slave
              label: "To Kinetix Slave (via Dual Camera Splitter)"
              sequence:
                - optical_path_element_id: mxr00547_v3_dualcam_gfp_mcherry_2_bands_celesta_set
                - endpoint_id: kinetix_slave_camera
            - branch_id: to_eyepieces
              label: "To Eyepieces"
              sequence:
                - endpoint_id: eyepieces
                
  - id: widefield_fluorescence
    name: Epi-fluorescence
    modalities:
      - widefield_fluorescence
    illumination_sequence:
      - source_id: d_ledi_fluorescence_led_illumination_system
      - optical_path_element_id: epi_turret
    detection_sequence:
      - optical_path_element_id: epi_turret
      - optical_path_element_id: nikon_dia
      - optical_path_element_id: trinocular_port
      - branches:
          selection_mode: exclusive
          items:
            - branch_id: to_master_camera
              label: "To Kinetix Master"
              sequence:
                - endpoint_id: kinetix_master_camera
            - branch_id: to_slave_camera
              label: "To Kinetix Slave"
              sequence:
                - endpoint_id: kinetix_slave_camera
            - branch_id: to_eyepieces
              label: "To Eyepieces"
              sequence:
                - endpoint_id: eyepieces
                
  - id: transmitted_brightfield
    name: Transmitted light
    modalities:
      - transmitted_brightfield
    illumination_sequence:
      - source_id: t12_d_lhled_led_lamp_house
    detection_sequence:
      - optical_path_element_id: nikon_dia
      - optical_path_element_id: trinocular_port
      - branches:
          selection_mode: exclusive
          items:
            - branch_id: to_master_camera
              label: "To Kinetix Master"
              sequence:
                - endpoint_id: kinetix_master_camera
            - branch_id: to_slave_camera
              label: "To Kinetix Slave"
              sequence:
                - endpoint_id: kinetix_slave_camera
            - branch_id: to_eyepieces
              label: "To Eyepieces"
              sequence:
                - endpoint_id: eyepieces
