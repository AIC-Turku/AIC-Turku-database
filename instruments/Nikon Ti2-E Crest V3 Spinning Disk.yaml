instrument:
  display_name: Nikon Ti2-E Crest V3
  instrument_id: scope-nikon-crest-v3
  manufacturer: Nikon / CrestOptics
  model: Eclipse Ti2-E with X-Light V3 HTDS
  year_of_purchase: ''
  funding: ''
  stand_orientation: inverted
  location: '' # Flag: Required field. Please provide the physical location.
  notes: High-end spinning disk system with Lumencor Celesta 7-channel laser, dual Photometrics Kinetix cameras, and Dark Enclosure WarmBox.
  url: https://www.microscope.healthcare.nikon.com/products/inverted-microscopes/eclipse-ti2

modalities:
  - confocal_spinning_disk
  - widefield_fluorescence
  - transmitted_brightfield

modules:
  - name: hardware_autofocus
    notes: 'Nikon Perfect Focus System (PFS). WARNING: Not compatible with 751 nm excitation. The PFS beamsplitter needs to be taken out from the lightpath in the optical configurations for 749/751nm use.'
    url: ''
  - name: incubation
    notes: Dark Enclosure WarmBox set for Ti2 (TI2WB-SP400NX-G)
    url: ''
  - name: piezo_z_stage
    notes: QG/Prior SP600 piezo kit with well-plate holder
    url: ''

software:
  acquisition:
    name: NIS-Elements AR
    version: 
    notes: Includes 6D, JOBS 2.0, 3D Measurement, and RT Acquisition
    url: https://www.microscope.healthcare.nikon.com/products/software/nis-elements

hardware:
  environment:
    temperature_control: true
    notes: Dark Enclosure WarmBox set for Ti2 (TI2WB-SP400NX-G)

  hardware_autofocus:
    is_installed: true
    type: infrared_reflection # Flag: Verify this matches a canonical ID in vocab/autofocus_types.yaml

  stages:
    - type: piezo # Flag: Verify this matches a canonical ID in vocab/stage_types.yaml
      manufacturer: Prior
      model: QG/Prior SP600 piezo kit
      notes: QG/Prior SP600 piezo kit with well-plate holder

  scanner:
    type: spinning_disk
    pinhole_um: # Flag: Strictly required by policy for spinning_disk. Please provide pinhole diameter (e.g., 50).
    notes: CrestOptics X-Light V3 HTDS (Laser-SP disk-Throughput-V2&V3 50:250um)
    url: https://crestoptics.com/x-light-v3/

  light_sources:
    - kind: laser
      manufacturer: Lumencor
      model: Celesta 7ch with Despeckler
      wavelength_nm: '405'
      power: ~800 mW
      notes: 'Integral filter: 405/12'
      url: https://lumencor.com/products/celesta-light-engine
    - kind: laser
      manufacturer: Lumencor
      model: Celesta 7ch
      wavelength_nm: '446'
      power: ~800 mW
      notes: 'Integral filter: 446/12'
      url: ''
    - kind: laser
      manufacturer: Lumencor
      model: Celesta 7ch
      wavelength_nm: '477'
      power: ~800 mW
      notes: 'Integral filter: 476/12'
      url: ''
    - kind: laser
      manufacturer: Lumencor
      model: Celesta 7ch
      wavelength_nm: '520'
      power: ~800 mW
      notes: 'Integral filter: 518/12'
      url: ''
    - kind: laser
      manufacturer: Lumencor
      model: Celesta 7ch
      wavelength_nm: '546'
      power: ~800 mW
      notes: 'Integral filter: 545/12'
      url: ''
    - kind: laser
      manufacturer: Lumencor
      model: Celesta 7ch
      wavelength_nm: '638'
      power: ~800 mW
      notes: 'Integral filter: 637/12'
      url: ''
    - kind: laser
      manufacturer: Lumencor
      model: Celesta 7ch
      wavelength_nm: '749'
      power: ~800 mW
      notes: 'Integral filter: 748/12'
      url: ''
    - kind: led
      manufacturer: Nikon
      model: D-LEDI Fluorescence LED Illumination System
      wavelength_nm: broadband
      power: ''
      notes: For widefield epifluorescence
      url: ''
    - kind: led
      manufacturer: Nikon
      model: T12-D-LHLED LED Lamp House
      wavelength_nm: white
      power: ''
      notes: For DIA transmitted illumination
      url: ''

  detectors:
    - kind: scmos
      manufacturer: Photometrics
      model: Kinetix
      pixel_pitch_um: 6.5
      qe_peak_pct: 95
      notes: Master Camera (1st F-cam) - GFP/Cy5 in DualCam mode
      url: https://www.photometrics.com/products/kinetix-family/kinetix
    - kind: scmos
      manufacturer: Photometrics
      model: Kinetix
      pixel_pitch_um: 6.5
      qe_peak_pct: 95
      notes: Slave Camera (2nd F-cam) - DAPI/Cy3 in DualCam mode
      url: https://www.photometrics.com/products/kinetix-family/kinetix

  splitters:
    - name: Nikon DIA
      type: emission_splitter
      notes: Neutral filter for assigning the light path to single camera
      url: ''
    - name: MXR00546 Celesta DAPI/Cy3 - GFP/Cy5
      type: emission_splitter
      notes: 'DualCam Splitter: GFP & Cy5 Channel on Master Camera; DAPI & Cy3 on Slave Camera'
      url: ''

