instrument:
  display_name: Nikon Ti2-E Crest V3
  instrument_id: scope-nikon-crest-v3
  manufacturer: Nikon / CrestOptics
  model: Eclipse Ti2-E with X-Light V3 HTDS
  year_of_purchase: '2025'
  funding: ''
  stand_orientation: inverted
  ocular_availability: trinocular
  location: BioCity, 5th floor, room 5149
  notes: High-end spinning disk system with Lumencor Celesta 7-channel laser, dual Photometrics Kinetix cameras, and Dark Enclosure WarmBox.
  url: https://www.microscope.healthcare.nikon.com/products/inverted-microscopes/eclipse-ti2

modalities:
  - confocal_spinning_disk
  - widefield_fluorescence
  - transmitted_brightfield

modules:
  - type: hardware_autofocus # CORRECTED: Changed 'name' to 'type'
    notes: 'Nikon Perfect Focus System (PFS). WARNING: Not compatible with 751 nm excitation. The PFS beamsplitter needs to be taken out from the lightpath in the optical configurations for 749/751nm use.'
    url: ''
    manufacturer: Nikon
    model: Perfect Focus System
  - type: incubation
    notes: Dark Enclosure WarmBox set for Ti2 (TI2WB-SP400NX-G)
    url: ''
    manufacturer: Nikon
    model: WarmBox TI2WB-SP400NX-G
  - type: piezo_z_stage
    notes: QG/Prior SP600 piezo kit with well-plate holder
    url: ''
    manufacturer: Prior
    model: SP600 piezo kit
  - type: hardware_triggering
    notes: Crest V3 Triggering Kit (MXCRO057) including NI PCIe-6738, Ubob42 NIDAQ Ultimate Breakout Box, and 9-Channel Trigger Cable for high-speed device synchronization.
    url: ''
    manufacturer: CrestOptics
    model: V3 Triggering Kit MXCRO057
  - type: motorized_stage
    notes: Motorized XY stage for the Nikon Ti2-E.
    url: ''
    manufacturer: Nikon
    model: Motorized XY Stage

software:
  - role: acquisition
    name: NIS-Elements AR
    version: ''
  - role: analysis
    name: NIS-Elements AR
    version: ''
    notes: Includes 6D, JOBS 2.0, 3D Measurement, and RT Acquisition
    url: https://www.microscope.healthcare.nikon.com/products/software/nis-elements

hardware:
  environment:
    temperature_control: true
    notes: Dark Enclosure WarmBox set for Ti2 (TI2WB-SP400NX-G)
    
  hardware_autofocus:
    is_installed: true
    type: infrared_reflection
    
  stages:
    - type: z_piezo # Canonical stage type for the installed piezo Z stage
      manufacturer: Prior
      model: QG/Prior SP600 piezo kit
      notes: QG/Prior SP600 piezo kit with well-plate holder
      
  scanner:
    type: spinning_disk
    pinhole_um: 50
    notes: CrestOptics X-Light V3 HTDS (Laser-SP disk-Throughput-V2&V3 50:250um)
    url: https://crestoptics.com/x-light-v3/
    
  detectors:
    - id: kinetix_master_camera
      kind: scmos
      manufacturer: Photometrics
      model: Kinetix
      pixel_pitch_um: 6.5
      qe_peak_pct: 95
      sensor_format_px: 3200 x 3200
      notes: Master Camera (1st F-cam) - GFP/Cy5 in DualCam mode
      url: https://www.photometrics.com/products/kinetix-family/kinetix
    - id: kinetix_slave_camera
      kind: scmos
      manufacturer: Photometrics
      model: Kinetix
      pixel_pitch_um: 6.5
      qe_peak_pct: 95
      sensor_format_px: 3200 x 3200
      notes: Slave Camera (2nd F-cam) - DAPI/Cy3 in DualCam mode
      url: https://www.photometrics.com/products/kinetix-family/kinetix

  eyepieces: # ADDED: Required for trinocular routing
