instrument:
  display_name: Leica DM RB
  instrument_id: scope-leica-dm-rb
  manufacturer: Leica Microsystems
  model: Leica DM RB
  year_of_purchase: ''
  funding: ''
  stand_orientation: upright
  ocular_availability: trinocular
  location: BioCity, 2nd floor, room 2076
  notes: 'Widefield microscope (upright) with camera port. Imaging modes: Fluorescence (epifluorescence), Brightfield (transmitted light), Darkfield.'
  url: ''

modalities:
  - widefield_fluorescence
  - transmitted_brightfield
  - darkfield

modules: []

software: []

hardware:
  scanner:    
    type: none
    notes: ''
    url: ''

  light_sources:
    - kind: halogen_lamp
      manufacturer: Leica 
      model: 12V 100W halogen bulb
      wavelength_nm: broadband
      power: 100 W
      path: transmitted
      notes: Transmitted light source for Brightfield and Darkfield
      url: ''
    - kind: arc_lamp
      manufacturer: Osram 
      model: 50W HBO short arc bulb
      wavelength_nm: broadband
      power: 50 W
      path: epi
      notes: Fluorescence excitation source
      url: ''
  
  light_path:
    cube_mechanisms:
      - name: Fluorescence Turret
        type: turret
        path: epi
        slots: 3
        positions:
          Pos_1:
            name: Filter Cube A (DAPI/Hoechst)
            # Calculated from text: ex 340-380 nm -> center 360, width 40
            excitation_filter:
              component_type: bandpass
              center_nm: 360
              width_nm: 40
            dichroic:
              component_type: dichroic
              cutoffs_nm: [400]
            # Calculated from text: em >425 nm -> longpass cut-on 425
            emission_filter:
              component_type: longpass
              cut_on_nm: 425
          Pos_2:
            name: Filter Cube EGFP
            # Calculated from text: ex 450-490 nm -> center 470, width 40
            excitation_filter:
              component_type: bandpass
              center_nm: 470
              width_nm: 40
            dichroic:
              component_type: dichroic
              cutoffs_nm: [495]
            # Calculated from text: em 500-550 nm -> center 525, width 50
            emission_filter:
              component_type: bandpass
              center_nm: 525
              width_nm: 50
          Pos_3:
            name: Filter Cube CY3 (TRITC/RFP)
            # Calculated from text: ex 533-558 nm -> center 545.5, width 25
            excitation_filter:
              component_type: bandpass
              center_nm: 545.5
              width_nm: 25
            dichroic:
              component_type: dichroic
              cutoffs_nm: [565]
            # Calculated from text: em 570-640 nm -> center 605, width 70
            emission_filter:
              component_type: bandpass
              center_nm: 605
              width_nm: 70

    splitters:
      - name: Camera Port
        type: emission_splitter
        path: transmitted
        notes: Camera port for optional detector.

  objectives:
    - id: 10x_air
      manufacturer: Leica
      model: PL FLUOTAR 10x/0.30
      product_code: '506000'
      magnification: 10.0
      numerical_aperture: 0.3
      working_distance: ''
      immersion: air
      # VOCAB FIXED: 'PL FLUOTAR' maps to 'plan_fluorite'
      correction: plan_fluorite
