  sources:
  - kind: halogen_lamp
    manufacturer: Leica
    model: 12V 100W halogen bulb
    power: 100 W
    role: transmitted_illumination
    notes: Transmitted light source for Brightfield and Darkfield. Broadband illumination.
    url: ''
    id: 12v_100w_halogen_bulb
    modalities:
    - transmitted_brightfield
    - darkfield
  - kind: arc_lamp
    manufacturer: Osram
    model: 50W HBO short arc bulb
    power: 50 W
    notes: Fluorescence excitation source. Broadband illumination.
    url: ''
    id: 50w_hbo_short_arc_bulb
    modalities:
    - widefield_fluorescence
  optical_path_elements:
  - name: Fluorescence Turret
    stage_role: cube
    id: fluorescence_turret
    element_type: turret
    modalities:
    - widefield_fluorescence
    positions:
      Pos_1:
        name: Filter Cube A (DAPI/Hoechst)
        component_type: filter_cube
        cut_on_nm:
        - 425
        notes: 'Excitation: 360/40 nm. Dichroic Cutoff: 400 nm.'
        excitation_filter:
          component_type: bandpass
          center_nm: 360
          width_nm: 40
        dichroic:
          component_type: dichroic
          cut_on_nm: 400
        emission_filter:
          component_type: longpass
          cut_on_nm: 425
      Pos_2:
        name: Filter Cube EGFP
        component_type: filter_cube
        bands:
        - center_nm: 525
          width_nm: 50
        notes: 'Excitation: 470/40 nm. Dichroic Cutoff: 495 nm.'
        excitation_filter:
          component_type: bandpass
          center_nm: 470
          width_nm: 40
        dichroic:
          component_type: dichroic
          cut_on_nm: 495
        emission_filter:
          component_type: bandpass
          center_nm: 525
          width_nm: 50
      Pos_3:
        name: Filter Cube CY3 (TRITC/RFP)
        component_type: filter_cube
        bands:
        - center_nm: 605
          width_nm: 70
        notes: 'Excitation: 545.5/25 nm. Dichroic Cutoff: 565 nm.'
        excitation_filter:
          component_type: bandpass
          center_nm: 545.5
          width_nm: 25
        dichroic:
          component_type: dichroic
          cut_on_nm: 565
        emission_filter:
          component_type: bandpass
          center_nm: 605
          width_nm: 70
  - name: Trinocular Port
    stage_role: splitter
    id: camera_port
    element_type: splitter
    selection_mode: exclusive
    modalities:
    - widefield_fluorescence
    - transmitted_brightfield
    - darkfield
    supported_branch_modes:
    - selected
    supported_branch_count: 2
    notes: Camera port for optional detector and eyepieces.
light_paths:
- id: widefield_fluorescence
  name: Epi-fluorescence
  illumination_sequence:
  - source_id: 50w_hbo_short_arc_bulb
  - optical_path_element_id: fluorescence_turret
  detection_sequence:
  - optical_path_element_id: fluorescence_turret
  - optical_path_element_id: camera_port
  - branches:
      selection_mode: exclusive
      items:
      - branch_id: to_camera
        label: To Camera Port
        sequence:
        - endpoint_id: camera_port_main
      - branch_id: to_eyepieces
        label: To Eyepieces
        sequence:
        - endpoint_id: eyepieces
  route_type: widefield_fluorescence
- id: transmitted_brightfield
  name: Transmitted light
  illumination_sequence:
  - source_id: 12v_100w_halogen_bulb
  detection_sequence:
  - optical_path_element_id: camera_port
  - branches:
      selection_mode: exclusive
      items:
      - branch_id: to_camera
        label: To Camera Port
        sequence:
        - endpoint_id: camera_port_main
      - branch_id: to_eyepieces
        label: To Eyepieces
        sequence:
        - endpoint_id: eyepieces
  route_type: transmitted_brightfield
- id: darkfield
  name: Darkfield
  illumination_sequence:
  - source_id: 12v_100w_halogen_bulb
  detection_sequence:
  - optical_path_element_id: camera_port
  - branches:
      selection_mode: exclusive
      items:
      - branch_id: to_camera
        label: To Camera Port
        sequence:
        - endpoint_id: camera_port_main
      - branch_id: to_eyepieces
        label: To Eyepieces
        sequence:
        - endpoint_id: eyepieces
  route_type: darkfield
