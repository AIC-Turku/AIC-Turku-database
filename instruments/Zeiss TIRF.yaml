      manufacturer: Hamamatsu
      model: C9100-13
      pixel_pitch_um: 16.0 # Flag: Required by schema for emccd. Standard specification for this camera.
      notes: 512x512 pixels
      url: ''
    - kind: scmos
      manufacturer: Hamamatsu
      model: ORCA-Flash4.0 CMOS
      pixel_pitch_um: 6.5 # Flag: Required by schema for scmos. Standard specification for this camera.
      notes: 2048x2048 pixels
      url: ''

  filters:
    - name: Filter set 38 HE (GFP)
      location: Filter Turret
      product_code: 38 HE
      excitation: 470/40
      dichroic: '' # Flag: Required because widefield_fluorescence/tirf is present. (Usually FT 495)
      emission: 525/50
      notes: ''
      url: ''
    - name: Filter set 43 HE (DsRed)
      location: Filter Turret
      product_code: 43 HE
      excitation: 550/25
      dichroic: '' # Flag: Required field. (Usually FT 570)
      emission: 605/70
      notes: ''
      url: ''
    - name: Filter set 76 HE (CFP/GFP/DsRed)
      location: Filter Turret
      product_code: 76 HE
      excitation: TBP 406+489+561
      dichroic: '' # Flag: Required field.
      emission: TBP 459+525+608
      notes: ''
      url: ''
    - name: Filter set 77 HE (GFP/mRFP/Alexa 633)
      location: Filter Turret
      product_code: 77 HE
      excitation: TBP 483+564+642
      dichroic: '' # Flag: Required field.
      emission: TBP 526+601+688
      notes: ''
      url: ''

