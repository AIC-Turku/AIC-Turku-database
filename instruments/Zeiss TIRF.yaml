  location: BioCity, 2nd floor, room 2209
  notes: TIRF/widefield microscope (inverted). TIRF imaging enables approximately
    70-150 nm axial (Z-axis) resolution near the basal cell membrane (vs. ~600 nm
    in common confocal microscopy). Designed for membrane studies such as endocytosis
