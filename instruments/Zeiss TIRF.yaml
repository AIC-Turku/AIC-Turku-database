instrument:
  display_name: Zeiss TIRF
  instrument_id: scope-zeiss-tirf
  manufacturer: Zeiss
  model: TIRF
  year_of_purchase: ''
  funding: ''
  stand_orientation: inverted
  ocular_availability: trinocular
  location: BioCity, 2nd floor, room 2209
  notes: 'TIRF/widefield microscope (inverted). TIRF imaging enables approximately 70-150 nm axial (Z-axis) resolution near the basal cell membrane (vs. ~600 nm in common confocal microscopy). Designed for membrane studies such as endocytosis and integrin trafficking, and also suitable for sensitive widefield imaging.'
  url: ''

modalities:
  - widefield_fluorescence
  - transmitted_brightfield
  - tirf

modules:
  - type: incubation # CORRECTED: Changed 'name' to the canonical 'type'
    notes: Heated incubator and sample holder
    url: ''
    manufacturer: Zeiss
    model: Heated Incubator and Sample Holder
  - type: hardware_autofocus
    notes: Definite Focus drift correction
    url: ''
    manufacturer: Zeiss
    model: Definite Focus
  - type: motorized_stage
    notes: Motorized XY stage
    url: ''
    manufacturer: Zeiss
    model: Motorized XY Stage

software:
  - role: acquisition
    name: Unknown
    version: ''
    url: ''

hardware:
  environment:
    temperature_control: true
    notes: Heated incubator and sample holder
    
  hardware_autofocus:
    is_installed: true
    type: infrared_reflection
    
  stages:
    - type: motorized_stage # CORRECTED: Replaced non-standard 'xy_motorized'
      manufacturer: Zeiss # ADDED: Required for completeness
      model: Motorized XY Stage
      notes: Motorized XY stage
      
  scanner:
    type: none
    notes: ''
    url: ''
    
  detectors:
    - kind: emccd
      manufacturer: Hamamatsu
      model: C9100-13
      pixel_pitch_um: 16.0
      sensor_format_px: 512 x 512
      notes: ''
      url: ''
      id: detector_1
    - kind: scmos
      manufacturer: Hamamatsu
      model: ORCA-Flash4.0 CMOS
      pixel_pitch_um: 6.5
      sensor_format_px: 2048 x 2048
      notes: ''
      url: ''
      id: detector_2

  eyepieces: # ADDED: Required for trinocular routing
    - id: eyepieces
      notes: 'Binocular Eyepieces'
      
  objectives:
    - id: 2.5x_air
      manufacturer: Zeiss
      model: EC Epiplan-Neofluar
      product_code: ''
      magnification: 2.5
      numerical_aperture: 0.06
      working_distance: 15.1 mm
      immersion: air
      correction: plan_fluorite
      afc_compatible: false
      specialties: []
      notes: ''
      url: ''
      is_installed: true
    - id: 10x_air
      manufacturer: Zeiss
      model: EC Epiplan-Neofluar
      product_code: ''
      magnification: 10.0
      numerical_aperture: 0.3
      working_distance: 5.2 mm
      immersion: air
      correction: plan_fluorite
      afc_compatible: false
      specialties: []
      notes: ''
      url: ''
      is_installed: true
    - id: 20x_air
      manufacturer: Zeiss
      model: Plan Apochromat
      product_code: ''
      magnification: 20.0
      numerical_aperture: 0.45
      working_distance: 8.2-6.9 mm
      immersion: air
      correction: plan_apochromat
      afc_compatible: true
      specialties: []
      notes: ''
      url: ''
      is_installed: true
    - id: 63x_oil
      manufacturer: Zeiss
      model: Alpha Plan Apochromat
      product_code: ''
      magnification: 63.0
      numerical_aperture: 1.46
      working_distance: 0.55 mm
      immersion: oil
      correction: plan_apochromat
      afc_compatible: true
      specialties:
        - tirf
      notes: ''
      url: ''
      is_installed: true
    - id: 100x_oil
      manufacturer: Zeiss
      model: Alpha Plan Apochromat
      product_code: ''
      magnification: 100.0
      numerical_aperture: 1.46
      working_distance: 0.11 mm
      immersion: oil
      correction: plan_apochromat
      afc_compatible: true
      specialties:
        - tirf
      notes: ''
      url: ''
      is_installed: true
      
  sources:
    - kind: laser
      manufacturer: Unknown # CORRECTED: Replaced empty strings
      model: 488 nm
      wavelength_nm: 488 # CORRECTED: Changed string to integer
      power: ''
      notes: ''
      url: ''
      id: 488_nm
      modalities:
        - widefield_fluorescence
        - tirf
      # CORRECTED: Removed legacy 'path: epi' aliases
    - kind: laser
      manufacturer: Unknown
      model: 561 nm
      wavelength_nm: 561
      power: ''
      notes: ''
      url: ''
      id: 561_nm
      modalities:
        - widefield_fluorescence
        - tirf
    - kind: laser
      manufacturer: Unknown
      model: 639 nm
      wavelength_nm: 639
      power: ''
      notes: ''
      url: ''
      id: 639_nm
      modalities:
        - widefield_fluorescence
        - tirf
    - kind: halogen_lamp # ADDED: Required to satisfy Transmitted Brightfield light path
      manufacturer: Zeiss
      model: Transmitted Halogen Lamp
      role: transmitted_illumination
      notes: Transmitted source for brightfield.
      id: halogen_lamp_transmitted
      modalities:
        - transmitted_brightfield
        
  optical_path_elements:
    - name: Filter Turret
      # CORRECTED: Migrated legacy hardware.filters into canonical element with standard bands
      stage_role: cube
      id: epi_turret
      element_type: turret
      modalities:
        - widefield_fluorescence
        - tirf
      positions:
        Pos_1:
          name: Filter set 38 HE (GFP)
          product_code: 38 HE
          component_type: filter_cube
          bands:
            - center_nm: 525
              width_nm: 50
          notes: 'Excitation: 470/40 nm.'
        Pos_2:
          name: Filter set 43 HE (DsRed)
          product_code: 43 HE
          component_type: filter_cube
          bands:
            - center_nm: 605
              width_nm: 70
          notes: 'Excitation: 550/25 nm.'
        Pos_3:
          name: Filter set 76 HE (CFP/GFP/DsRed)
          product_code: 76 HE
          component_type: filter_cube
          bands: # CORRECTED: Translated complex TBP string into individual bands
            - center_nm: 459
              width_nm: 25
            - center_nm: 525
              width_nm: 30
            - center_nm: 608
              width_nm: 30
          notes: 'Excitation: TBP 406+489+561 nm. Emission: TBP 459+525+608 nm.'
        Pos_4:
          name: Filter set 77 HE (GFP/mRFP/Alexa 633)
          product_code: 77 HE
          component_type: filter_cube
          bands:
            - center_nm: 526
              width_nm: 25
            - center_nm: 601
              width_nm: 30
            - center_nm: 688
              width_nm: 40
          notes: 'Excitation: TBP 483+564+642 nm. Emission: TBP 526+601+688 nm.'

    - name: Trinocular Port # ADDED: Splitting logic for ocular paths
      stage_role: splitter
      id: trinocular_port
      element_type: splitter
      selection_mode: exclusive
      modalities:
        - widefield_fluorescence
        - transmitted_brightfield
        - tirf
      supported_branch_modes:
        - exclusive
      supported_branch_count: 3

  # CORRECTED: Removed deprecated hardware.endpoints block.

light_paths:
  - id: tirf # CORRECTED: Aligned ID with standard modalities
    name: TIRF
    illumination_sequence:
      - source_id: 488_nm
      - source_id: 561_nm
      - source_id: 639_nm
      - optical_path_element_id: epi_turret
    detection_sequence:
      - optical_path_element_id: epi_turret
      - optical_path_element_id: trinocular_port
      - branches: # ADDED: Required detection routing to endpoints
          selection_mode: exclusive
          items:
            - branch_id: to_emccd
              label: "To Hamamatsu EMCCD"
              sequence:
                - endpoint_id: detector_1
            - branch_id: to_scmos
              label: "To ORCA-Flash4.0 sCMOS"
              sequence:
                - endpoint_id: detector_2
            - branch_id: to_eyepieces
              label: "To Eyepieces"
              sequence:
                - endpoint_id: eyepieces

  - id: widefield_fluorescence
    name: Epi-fluorescence
    illumination_sequence:
      - source_id: 488_nm
      - source_id: 561_nm
      - source_id: 639_nm
      - optical_path_element_id: epi_turret
    detection_sequence:
      - optical_path_element_id: epi_turret
      - optical_path_element_id: trinocular_port
      - branches:
          selection_mode: exclusive
          items:
            - branch_id: to_emccd
              label: "To Hamamatsu EMCCD"
              sequence:
                - endpoint_id: detector_1
            - branch_id: to_scmos
              label: "To ORCA-Flash4.0 sCMOS"
              sequence:
                - endpoint_id: detector_2
            - branch_id: to_eyepieces
              label: "To Eyepieces"
              sequence:
                - endpoint_id: eyepieces

  - id: transmitted_brightfield # ADDED: Routing for declared transmitted modality
    name: Transmitted Brightfield
    illumination_sequence:
      - source_id: halogen_lamp_transmitted
    detection_sequence:
      - optical_path_element_id: trinocular_port
      - branches:
          selection_mode: exclusive
          items:
            - branch_id: to_emccd
              label: "To Hamamatsu EMCCD"
              sequence:
                - endpoint_id: detector_1
            - branch_id: to_scmos
              label: "To ORCA-Flash4.0 sCMOS"
              sequence:
                - endpoint_id: detector_2
            - branch_id: to_eyepieces
              label: "To Eyepieces"
              sequence:
                - endpoint_id: eyepieces
