instrument:
  display_name: Zeiss TIRF
  instrument_id: scope-zeiss-tirf
  manufacturer: Zeiss
  model: TIRF
  year_of_purchase: ''
  funding: ''
  stand_orientation: inverted
  location: BioCity, 2nd floor, room 2209
  notes: 'TIRF/widefield microscope (inverted). TIRF imaging enables approximately 70-150 nm axial (Z-axis) resolution near the basal cell membrane (vs. ~600 nm in common confocal microscopy). Designed for membrane studies such as endocytosis and integrin trafficking, and also suitable for sensitive widefield imaging.'
  url: ''

modalities:
  - widefield_fluorescence
  - transmitted_brightfield
  - tirf

modules:
  - name: incubation
    notes: Heated incubator and sample holder
    url: ''
  - name: hardware_autofocus
    notes: Definite Focus drift correction
    url: ''
  - name: motorized_stage # Flag: Verify this matches a canonical ID in vocab/modules.yaml
    notes: Motorized XY stage
    url: ''

software:
  acquisition:
    name: Unknown # Flag: Recommend replacing with actual software name (e.g., Zeiss ZEN blue)
    version: ''
    url: ''

hardware:
  environment:
    temperature_control: true # Flag: Conditionally required due to 'incubation' module
    notes: Heated incubator and sample holder

  hardware_autofocus:
    is_installed: true
    type: infrared_reflection # Flag: Verify this matches a canonical ID in vocab/autofocus_types.yaml

  stages:
    - type: xy_motorized # Flag: Verify this matches a canonical ID in vocab/stage_types.yaml
      notes: Motorized XY stage

  scanner:
    type: none
    notes: ''
    url: ''

  light_sources:
    - kind: laser
      manufacturer: '' # Flag: Required field. Needs a manufacturer.
      model: 488 nm
      wavelength_nm: '488'
      power: ''
      notes: ''
      url: ''
    - kind: laser
      manufacturer: '' # Flag: Required field.
      model: 561 nm
      wavelength_nm: '561'
