instrument:
  display_name: Deltavision OMX
  instrument_id: scope-deltavision-omx
  manufacturer: GE Healthcare
  model: OMX V4
  year_of_purchase: '2016'
  funding: ''
  stand_orientation: inverted
  ocular_availability: camera_only
  location: BioCity, 5th floor, room 5149
  notes: Advanced multi-modal super-resolution system. Supports 2D/3D SIM, localization
    microscopy, fast widefield acquisition, Blaze dynamic high-speed SIM, and Ring-TIRF
    for evenly illuminated large fields of view.
  url: ''
modalities:
- widefield_fluorescence
- tirf
- sim
- smlm
