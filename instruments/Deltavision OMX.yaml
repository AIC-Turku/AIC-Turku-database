instrument:
  display_name: Deltavision OMX
  instrument_id: scope-deltavision-omx
  manufacturer: GE Healthcare
  model: OMX V4
  year_of_purchase: '2016'
  funding: ''
  stand_orientation: inverted
  location: BioCity, 5th floor, room 5149
  notes: Advanced multi-modal super-resolution system. Supports 2D/3D SIM, localization
    microscopy, fast widefield acquisition, Blaze dynamic high-speed SIM, and Ring-TIRF
    for evenly illuminated large fields of view.
  url: ''
modalities:
- widefield_fluorescence
- tirf
- sim
- smlm
modules:
- name: environmental_enclosure
  notes: Onstage incubator/heating assembly. Includes insulated sample holder, heating
    block, objective lens heater, and gas delivery system.
  url: ''
- name: hardware_autofocus
  notes: Ultimate Focus Hardware Autofocus Module
  url: ''
- name: piezo_z_stage
  notes: X, Y, Z Nanomotion sample stage with fast piezo Z-axis system
  url: ''
- name: 3d_sim
  notes: Proprietary electro-optical high speed structured illumination engine. 110-160
    nm lateral and 320-400 nm axial resolution.
  url: ''
- name: ring_tirf
  notes: Ring TIRF optics module with integrated PhotoKinetic (PK) optics. Allows
    rapid wavelength switching and TIRF depth penetration modulation.
  url: ''
software:
  acquisition:
    name: OMX Acquisition
    version: '3.70'
    url: ''
    notes: Master Control on Windows. Image processing on CentOS with softWoRx 6.0
      or newer for deconvolution/reconstruction.
