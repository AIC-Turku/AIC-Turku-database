    - transmitted_brightfield
    - dic
  optical_path_elements:
  - name: Filter Turret
    stage_role: dichroic
    id: filter_turret
    element_type: turret
    modalities:
    - widefield_fluorescence
    positions:
      Pos_1:
        name: Chroma 89403bs
        product_code: 89403bs
        component_type: multiband_dichroic
        notes: Dichroic for CFP/YFP/mCherry/Cy7
      Pos_2:
        name: Chroma 84000v2
        product_code: 84000v2
        component_type: multiband_dichroic
        notes: Quad-band for DAPI/FITC/TRITC/Cy5
      Pos_3:
        name: Chroma 96377
        product_code: '96377'
        component_type: bandpass
        bands:
        - center_nm: 809
          width_nm: 81
        notes: Cy7 emission filter housed in turret
  - name: Emission Wheel
    stage_role: emission
    id: emission_wheel
    element_type: filter_wheel
    modalities:
    - widefield_fluorescence
    positions:
      Pos_1:
        name: DAPI Emission
        component_type: bandpass
        bands:
        - center_nm: 435
          width_nm: 26
      Pos_2:
        name: CFP Emission
        component_type: bandpass
        bands:
        - center_nm: 475
          width_nm: 20
      Pos_3:
        name: GFP Emission
        component_type: bandpass
        bands:
        - center_nm: 515
          width_nm: 30
      Pos_4:
        name: YFP Emission
        component_type: bandpass
        bands:
        - center_nm: 540
          width_nm: 21
      Pos_5:
        name: TRITC Emission
        component_type: bandpass
        bands:
        - center_nm: 595
          width_nm: 40
      Pos_6:
        name: mCherry Emission
        component_type: bandpass
        bands:
        - center_nm: 632
          width_nm: 60
      Pos_7:
        name: Cy5 Emission
        component_type: bandpass
        bands:
        - center_nm: 705
          width_nm: 71
  - name: Lamp Filter Cubes
    stage_role: cube
    id: epi_turret
    element_type: turret
    modalities:
    - widefield_fluorescence
    positions:
      Pos_1:
        name: Standard Cubes
        component_type: filter_cube
        notes: Standard DAPI, CFP, GFP, YFP, and TexasRed cubes
  - name: DIC Fixed Analyzer
    stage_role: analyzer
    id: analyzer_slider
    element_type: slider
    modalities:
    - dic
    positions:
      Pos_1:
        component_type: analyzer
        notes: For DIC imaging
  - name: Trinocular Port
    stage_role: splitter
    id: trinocular_port
    element_type: splitter
    selection_mode: exclusive
    modalities:
    - widefield_fluorescence
    - transmitted_brightfield
    - dic
    supported_branch_modes:
    - selected
    supported_branch_count: 3
    notes: Routes light between oculars and dual camera ports.
light_paths:
- id: widefield_fluorescence
  name: Epi-fluorescence
  illumination_sequence:
  - source_id: spectra_x_395
  - source_id: spectra_x_440
  - source_id: spectra_x_475
  - source_id: spectra_x_550
  - source_id: spectra_x_575
  - source_id: spectra_x_640
  - source_id: spectra_x_730
  - optical_path_element_id: epi_turret
  - optical_path_element_id: filter_turret
  detection_sequence:
  - optical_path_element_id: filter_turret
  - optical_path_element_id: emission_wheel
  - optical_path_element_id: trinocular_port
  - branches:
      selection_mode: exclusive
      items:
      - branch_id: to_orca
        label: To Orca Flash4.0
        sequence:
        - endpoint_id: detector_1
      - branch_id: to_ds_fi3
        label: To DS-Fi3
        sequence:
        - endpoint_id: detector_2
      - branch_id: to_eyepieces
        label: To Eyepieces
        sequence:
        - endpoint_id: eyepieces
  route_type: widefield_fluorescence
- id: transmitted_brightfield
  name: Transmitted Brightfield
  illumination_sequence:
  - source_id: transmitted_illuminator
  detection_sequence:
  - optical_path_element_id: trinocular_port
  - branches:
      selection_mode: exclusive
      items:
      - branch_id: to_orca
        label: To Orca Flash4.0
        sequence:
        - endpoint_id: detector_1
      - branch_id: to_ds_fi3
        label: To DS-Fi3
        sequence:
        - endpoint_id: detector_2
      - branch_id: to_eyepieces
        label: To Eyepieces
        sequence:
        - endpoint_id: eyepieces
  route_type: transmitted_brightfield
- id: dic
  name: DIC
  illumination_sequence:
  - source_id: transmitted_illuminator
  detection_sequence:
  - optical_path_element_id: trinocular_port
  - branches:
      selection_mode: exclusive
      items:
      - branch_id: to_orca
        label: To Orca Flash4.0
        sequence:
        - endpoint_id: detector_1
      - branch_id: to_ds_fi3
        label: To DS-Fi3
        sequence:
        - endpoint_id: detector_2
      - branch_id: to_eyepieces
        label: To Eyepieces
        sequence:
        - endpoint_id: eyepieces
  route_type: dic
