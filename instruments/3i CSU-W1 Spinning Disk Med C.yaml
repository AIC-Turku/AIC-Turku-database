instrument:
  display_name: 3i Marianas CSU-W1 Spinning Disk Confocal
  instrument_id: scope-3i-csu-w1-spinning-disk-med-c
  manufacturer: 3i / Zeiss
  model: Marianas CSU-W1 Spinning Disk Confocal
  year_of_purchase: '2019'
  funding: ''
  stand_orientation: inverted
  ocular_availability: trinocular
  location: Medisiina C, 2nd floor, room C242
  notes: 'System 2032. Confocal spinning-disk microscope based on a Zeiss Axio Observer 7 Advanced Marianas base. Includes Mesa Illumination Enhancement and Field Flattening.'
  url: ''
modalities:
  - confocal_spinning_disk
  - widefield_fluorescence
  - transmitted

modules:
  - type: incubation
    notes: 'Okolab Full Enclosure Incubator with Temperature and digital CO2/O2 Control, Bold Line. Allows humidity control of 85% at 37C.'
    manufacturer: Okolab
    model: Bold Line
  - type: hardware_autofocus
    notes: 'Definite Focus 2 for Marianas.'
    manufacturer: Zeiss
    model: Definite Focus 2
  - type: motorized_stage
    notes: 'Linear Encoded Motorized X,Y Stage with 0.1um encoders.'
    manufacturer: ASI
  - type: piezo_z_stage
    notes: '300µm Piezo Z axis.'
    manufacturer: ASI

software:
  - role: acquisition
    name: SlideBook
    version: '6'
    developer: 3i
    notes: 'SlideBook 6 Full Online License with hardware control and TTL Synchronization.'

hardware:
  environment:
    temperature_control: true
    co2_control: true
    o2_control: true
    notes: 'Okolab full enclosure with Bold Line temperature controller, heater, and digital CO2/O2 gas mixer.'
  hardware_autofocus:
    is_installed: true
    type: infrared_reflection
  scanner:
    type: spinning_disk
    pinhole_um: 50
    notes: 'Yokogawa CSU-W1 T1 Spinning Disk Confocal with 50µm disk.'
  
  detectors:
    - kind: scmos
      manufacturer: Photometrics
      model: Prime BSI
      pixel_pitch_um: 6.5
      qe_peak_pct: 95
      sensor_format_px: 2048 x 2048
      notes: '4 Megapixel 95% QE backside illuminated sensor, 1.3e- read noise. Hardware specifications sourced from test report. Can also be used for widefield fluorescence imaging.'
      url: 'https://www.teledynevisionsolutions.com/products/prime-bsi/'
      id: detector_1
      
  eyepieces:
    - id: eyepieces
      notes: 'Binocular Eyepieces'

  objectives:
    - id: 5x_air
      manufacturer: Zeiss
      model: EC Plan-Neofluar 5x/0.16 NA Ph1
      product_code: 420331-9911-000
      magnification: 5.0
      numerical_aperture: 0.16
      working_distance: 18.5 mm
      immersion: air
      correction: plan_fluorite
      afc_compatible: false
      specialties:
        - phase
      notes: 'Ph1. Without immersion.'
      url: 'https://www.micro-shop.zeiss.com/en/us/shop/objectives/420331-9911-000/Objective-EC-Plan-Neofluar-5x-0.16-Ph1-M27'
      is_installed: true
    - id: 10x_air
      manufacturer: Zeiss
      model: Plan-Apochromat 10x/0.45 NA Ph1
      product_code: 420641-9910-000
      magnification: 10.0
      numerical_aperture: 0.45
      working_distance: 2.0 mm
      immersion: air
      correction: plan_apochromat
      afc_compatible: false
      specialties:
        - phase
      notes: 'Ph1. Without immersion.'
      url: 'https://www.micro-shop.zeiss.com/en/us/shop/objectives/420641-9910-000/Objective-Plan-Apochromat-10x-0.45-Ph1-M27'
      is_installed: true
    - id: 20x_air
      manufacturer: Zeiss
      model: Plan-Apochromat 20x/0.8 NA
      product_code: 420650-9902-000
      magnification: 20.0
      numerical_aperture: 0.8
      working_distance: 0.55 mm
      immersion: air
      correction: plan_apochromat
      afc_compatible: true
      specialties: []
      notes: 'Without immersion.'
      url: 'https://www.micro-shop.zeiss.com/en/us/shop/objectives/420650-9902-000/Objective-Plan-Apochromat-20x-0.8-M27'
      is_installed: true
    - id: 20x_air_2
      manufacturer: Zeiss
      model: LD Plan-Neofluar 20x/0.4 NA Corr
      product_code: 421350-9971-000
      magnification: 20.0
      numerical_aperture: 0.4
      working_distance: 7.9 mm
      immersion: air
      correction: plan_fluorite
      afc_compatible: true
      specialties:
        - correction_collar
      notes: 'Correction collar for 0-1.5 mm glass. Without immersion.'
      url: 'https://www.micro-shop.zeiss.com/en/us/shop/objectives/421350-9971-000/Objective-LD-Plan-Neofluar-20x-0.4-Corr-M27'
      is_installed: true
    - id: 40x_air
      manufacturer: Zeiss
      model: LD Plan-Neofluar 40x/0.6 NA Corr
      product_code: 421360-9971-000
      magnification: 40.0
      numerical_aperture: 0.6
      working_distance: 2.9 mm
      immersion: air
      correction: plan_fluorite
      afc_compatible: true
      specialties:
        - correction_collar
      notes: 'Correction collar for 0-1.5 mm glass. Without immersion.'
      url: 'https://www.micro-shop.zeiss.com/en/no/shop/objectives/421360-9971-000/Objective-LD-Plan-Neofluar-40x-0.6-Corr-M27'
      is_installed: true
    - id: 40x_water
      manufacturer: Zeiss
      model: C-Apochromat 40x/1.2 W Corr
      product_code: 421767-9970-000
      magnification: 40.0
      numerical_aperture: 1.2
      working_distance: 0.28 mm
      immersion: water
      correction: apochromat
      afc_compatible: true
      specialties:
        - correction_collar
      notes: 'Correction ring for 0.17 mm cover glass. Immersion: Water.'
      url: 'https://www.micro-shop.zeiss.com/en/us/shop/objectives/421767-9970-000/Objective-C-Apochromat-40x-1.2-W-Corr-M27'
      is_installed: true
    - id: 63x_oil
      manufacturer: Zeiss
      model: Plan-Apochromat 63x/1.4 NA Oil
      product_code: 420780-9900-000
      magnification: 63.0
      numerical_aperture: 1.4
      working_distance: 0.19 mm
      immersion: oil
      correction: plan_apochromat
      afc_compatible: true
      specialties: []
      notes: 'Immersion: Oil.'
      url: 'https://www.micro-shop.zeiss.com/en/us/shop/objectives/420780-9900-000/Objective-Plan-Apochromat-63x-1.4-Oil-M27'
      is_installed: true
    - id: 100x_oil
      manufacturer: Zeiss
      model: alpha Plan-Apochromat 100x/1.46 NA Oil DIC
      product_code: 420792-9800-000
      magnification: 100.0
      numerical_aperture: 1.46
      working_distance: 0.11 mm
      immersion: oil
      correction: plan_apochromat
      afc_compatible: true
      specialties:
        - dic
      notes: 'Immersion: Oil.'
      url: 'https://www.micro-shop.zeiss.com/en/us/shop/objectives/420792-9800-000/Objective-alpha-Plan-Apochromat-100x-1.46-Oil-DIC-M27'
      is_installed: true
      
  sources:
    - id: laserstack_405
      kind: laser
      role: excitation
      manufacturer: 3i
      model: LaserStack v4
      wavelength_nm: 405
      power: '100 mW'
      notes: 'Solid state laser. Measured fiber output: 46 mW; Back Aperture Output: 3.7 mW.'
    - id: laserstack_488
      kind: laser
      role: excitation
      manufacturer: 3i
      model: LaserStack v4
      wavelength_nm: 488
      power: '150 mW'
      notes: 'Solid state laser. Measured fiber output: 102 mW; Back Aperture Output: 9.6 mW.'
    - id: laserstack_561
      kind: laser
      role: excitation
      manufacturer: 3i
      model: LaserStack v4
      wavelength_nm: 561
      power: '150 mW'
      notes: 'Solid state laser. Measured fiber output: 105.5 mW; Back Aperture Output: 10.5 mW.'
    - id: laserstack_640
      kind: laser
      role: excitation
      manufacturer: 3i
      model: LaserStack v4
      wavelength_nm: 640
      power: '100 mW'
      notes: 'Solid state laser. Measured fiber output: 50.4 mW; Back Aperture Output: 6.3 mW.'
    - id: pe_300
      kind: led
      manufacturer: CoolLED
      model: pE-300
      notes: 'CoolLED PE-300 White Light Source with 3mm Liquid Light Guide. Broadband illumination.'
      
  optical_path_elements:
    - id: zeiss_widefield_fluorescence_positions
      name: Zeiss Widefield Fluorescence Positions
      element_type: turret
      stage_role: cube
      positions:
        Pos_1:
          product_code: LED-DAPI-A-ZHE-Zero
          component_type: filter_cube
          notes: 'DAPI Filter Cube. Nominal DAPI band 445/45nm.'
          bands:
            - center_nm: 445
              width_nm: 45
        Pos_2:
          product_code: LED-FITC-A-ZHE-Zero
          component_type: filter_cube
          notes: 'FITC Filter Cube. Nominal GFP band 525/30nm.'
          bands:
            - center_nm: 525
              width_nm: 30
        Pos_3:
          product_code: LED-TRITC-A-ZHE-Zero
          component_type: filter_cube
          notes: 'TRITC Filter Cube. Nominal Cy3/Alexa 568 band 617/73nm.'
          bands:
            - center_nm: 617
              width_nm: 73
              
    - id: csu_w1_dichroic_slider
      name: CSU-W1 Dichroic Slider
      element_type: slider
      stage_role: dichroic
      positions:
        Pos_1:
          component_type: multiband_dichroic
          product_code: Di01-T405/488/568/647-13x15x0.5
          notes: 'Quad band Dichroic for CSU-W1 405/488/568/647 Excitation.'
          bands:
            - center_nm: 440
              width_nm: 25
            - center_nm: 521
              width_nm: 25
            - center_nm: 607
              width_nm: 25
            - center_nm: 700
              width_nm: 25
              
    - id: csu_w1_emission_wheel
      name: CSU-W1 Emission Wheel
      element_type: filter_wheel
      stage_role: emission
      positions:
        Pos_1:
          component_type: multiband_bandpass
          product_code: FF01-440/521/607/700-25
          notes: 'Quad Band Emitter.'
          bands:
            - center_nm: 440
              width_nm: 25
            - center_nm: 521
              width_nm: 21
            - center_nm: 607
              width_nm: 34
            - center_nm: 700
              width_nm: 45
        Pos_2:
          component_type: bandpass
          product_code: FF01-445/45-25
          notes: 'Individual Emitter.'
          bands:
            - center_nm: 445
              width_nm: 45
        Pos_3:
          component_type: bandpass
          product_code: FF01-525/30-25
          notes: 'Individual Emitter.'
          bands:
            - center_nm: 525
              width_nm: 30
        Pos_4:
          component_type: bandpass
          product_code: FF02-617/73-25
          notes: 'Individual Emitter.'
          bands:
            - center_nm: 617
              width_nm: 73
        Pos_5:
          component_type: bandpass
          product_code: FF01-692/40-25
          notes: 'Individual Emitter.'
          bands:
            - center_nm: 692
              width_nm: 40

    - id: trinocular_port_selector
      name: Trinocular Head Port Selector
      element_type: splitter
      stage_role: distribution

light_paths:
  - id: confocal
    name: Confocal
    illumination_sequence:
      - source_id: laserstack_405
      - source_id: laserstack_488
      - source_id: laserstack_561
      - source_id: laserstack_640
      - optical_path_element_id: csu_w1_dichroic_slider
    detection_sequence:
      - optical_path_element_id: csu_w1_dichroic_slider
      - optical_path_element_id: csu_w1_emission_wheel
      - endpoint_id: detector_1
      
  - id: epi
    name: Epi-fluorescence
    illumination_sequence:
      - source_id: pe_300
      - optical_path_element_id: zeiss_widefield_fluorescence_positions
    detection_sequence:
      - optical_path_element_id: zeiss_widefield_fluorescence_positions
      - optical_path_element_id: trinocular_port_selector
      - branches:
          selection_mode: selectable
          items:
            - branch_id: to_camera
              label: "To Camera"
              sequence:
                - endpoint_id: detector_1
            - branch_id: to_eyepieces
              label: "To Eyepieces"
              sequence:
                - endpoint_id: eyepieces
                
  - id: transmitted
    name: Transmitted light
    illumination_sequence: []
    detection_sequence:
      - optical_path_element_id: trinocular_port_selector
      - branches:
          selection_mode: selectable
          items:
            - branch_id: to_camera
              label: "To Camera"
              sequence:
                - endpoint_id: detector_1
            - branch_id: to_eyepieces
              label: "To Eyepieces"
              sequence:
                - endpoint_id: eyepieces
