instrument:
  display_name: 3i CSU-W1 Spinning Disk Med C
  instrument_id: scope-3i-csu-w1-spinning-disk-med-c
  manufacturer: 3i / Zeiss
  model: Marianas CSU-W1 Spinning Disk Confocal
  year_of_purchase: "2019"
  funding: ""
  stand_orientation: inverted
  ocular_availability: trinocular
  location: Medisiina C, 2nd floor, room C242
  notes: >
    Confocal spinning-disk microscope based on a Zeiss Axio Observer 7.
    Includes MESA Illumination Enhancement. Confocal route uses a Yokogawa
    CSU-W1 T1 with 50 µm disk; low-magnification objectives are primarily
    for widefield/overview imaging rather than optimal confocal sectioning.
  url: ""

modalities:
  - confocal_spinning_disk
  - widefield_fluorescence
  - transmitted_brightfield
  - phase_contrast

modules:
  - name: incubation
    notes: Okolab Full Enclosure Incubator with Temperature and digital CO2/O2 Control
    url: ""
    manufacturer: Okolab
    model: Full Enclosure Incubator
  - name: hardware_autofocus
    notes: Zeiss Definite Focus 2
    url: ""
    manufacturer: Zeiss
    model: Definite Focus 2
  - name: frap
    notes: FRAP/Photoactivation module
    url: ""
    manufacturer: 3i
    model: Vector FRAP/Photoactivation Module

software:
  - role: acquisition
    name: 3i SlideBook
    version: "6"
    url: ""

hardware:
  environment:
    temperature_control: true
    co2_control: true
    o2_control: true
    notes: Okolab Full Enclosure Incubator with Temperature and digital CO2/O2 Control

  hardware_autofocus:
    is_installed: true
    type: infrared_reflection

  scanner:
    type: spinning_disk
    pinhole_um: 50
    notes: >
      Yokogawa CSU-W1 T1 with 50 µm disk. This is appropriate for standard
      spinning-disk confocal operation but is not optimal for low-magnification
      confocal sectioning compared with a 25 µm disk configuration.
    url: ""

  light_sources:
    - kind: laser
      role: excitation
      path: confocal
      manufacturer: 3i
      model: LaserStack v4
      wavelength_nm: 405
      power: 100 mW
      notes: "Measured fiber output: 46 mW"
      url: ""

    - kind: laser
      role: excitation
      path: confocal
      manufacturer: 3i
      model: LaserStack v4
      wavelength_nm: 488
      power: 150 mW
      notes: "Measured fiber output: 102 mW"
      url: ""

    - kind: laser
      role: excitation
      path: confocal
      manufacturer: 3i
      model: LaserStack v4
      wavelength_nm: 561
      power: 150 mW
      notes: "Measured fiber output: 105.5 mW"
      url: ""

    - kind: laser
      role: excitation
      path: confocal
      manufacturer: 3i
      model: LaserStack v4
      wavelength_nm: 640
      power: 100 mW
      notes: "Measured fiber output: 50.4 mW"
      url: ""

    - kind: led
      path: epi
      manufacturer: CoolLED
      model: pE-300
      wavelength_nm: broadband
      power: ""
      notes: White-light LED source with liquid light guide for widefield fluorescence
      url: ""

  detectors:
    - kind: scmos
      manufacturer: Photometrics
      model: Prime BSI sCMOS
      pixel_pitch_um: 6.5
      qe_peak_pct: 95
      sensor_format_px: "2048 x 2048"
      path: confocal
      notes: "6.5 µm pixel size, ~95% peak QE"
      url: "https://www.teledynevisionsolutions.com/products/prime-bsi/?vertical=tvs-photometrics&segment=tvs"
      id: detector_1

  light_path:
    endpoints:
      - id: detector_1
        endpoint_type: detector
        display_label: "Prime BSI sCMOS"
        path: confocal
      - id: eyepieces
        endpoint_type: eyepiece
        display_label: "Binocular Eyepieces"
        path: transmitted

    dichroic_mechanisms:
      - name: CSU-W1 Dichroic Slider
        type: slider
        path: confocal
        slots: 3
        positions:
          Pos_1:
            component_type: multiband_dichroic
            product_code: Di01-T405/488/568/647
            cutoffs_nm: [405, 488, 568, 647]
            notes: >
              Yokogawa/CSU-W1-compatible multiband dichroic for 405/488/561/640-class
              excitation and corresponding fluorescence routing. Product code uses
              the vendor's 568 naming convention even though the installed laser line is 561 nm.

    emission_mechanisms:
      - name: CSU-W1 Emission Wheel
        type: filter_wheel
        path: confocal
        slots: 5
        positions:
          Pos_1:
            component_type: multiband_bandpass
            product_code: FF01-440/521/607/700-25
            bands:
              - {center_nm: 440, width_nm: 25}
              - {center_nm: 521, width_nm: 25}
              - {center_nm: 607, width_nm: 25}
              - {center_nm: 700, width_nm: 25}
            notes: >
              Quad-band emitter for multicolor spinning-disk imaging. Product code FF01-440/521/607/700-25
              indicates approximately 25 nm-wide passbands centered at 440, 521, 607, and 700 nm.
          Pos_2:
            component_type: bandpass
            product_code: FF01-445/45-25
            center_nm: 445
            width_nm: 45
          Pos_3:
            component_type: bandpass
            product_code: FF01-525/30-25
            center_nm: 525
            width_nm: 30
          Pos_4:
            component_type: bandpass
            product_code: FF02-617/73-25
            center_nm: 617
            width_nm: 73
          Pos_5:
            component_type: bandpass
            product_code: FF01-692/40-25
            center_nm: 692
            width_nm: 40

    cube_mechanisms:
      - name: Zeiss Widefield Fluorescence Positions
        type: turret
        path: epi
        slots: 3
        positions:
          Pos_1:
            name: DAPI Cube
            product_code: LED-DAPI-A-ZHE-Zero
            notes: >
              Placeholder entry for widefield fluorescence position. Exact excitation,
              dichroic, and emission spectra should be filled in when verified from
              the installed Zeiss filter set documentation.
            excitation_filter:
              component_type: empty
            dichroic:
              component_type: empty
            emission_filter:
              component_type: empty

          Pos_2:
            name: FITC Cube
            product_code: LED-FITC-A-ZHE-Zero
            notes: >
              Placeholder entry for widefield fluorescence position. Exact excitation,
              dichroic, and emission spectra should be filled in when verified from
              the installed Zeiss filter set documentation.
            excitation_filter:
              component_type: empty
            dichroic:
              component_type: empty
            emission_filter:
              component_type: empty

          Pos_3:
            name: TRITC Cube
            product_code: LED-TRITC-A-ZHE-Zero
            notes: >
              Placeholder entry for widefield fluorescence position. Exact excitation,
              dichroic, and emission spectra should be filled in when verified from
              the installed Zeiss filter set documentation.
            excitation_filter:
              component_type: empty
            dichroic:
              component_type: empty
            emission_filter:
              component_type: empty

  objectives:
    - id: 5x_air
      manufacturer: Zeiss
      model: EC Plan-Neofluar 5x/0.16 NA Ph1
      product_code: 420331-9911-000
      magnification: 5.0
      numerical_aperture: 0.16
      working_distance: 18.5 mm
      immersion: air
      correction: plan_fluorite
      afc_compatible: false
      specialties:
        - phase
      notes: "Ph1"
      url: "https://www.micro-shop.zeiss.com/en/us/shop/objectives/420331-9911-000/Objective-EC-Plan-Neofluar-5x-0.16-Ph1-M27"
      is_installed: true

