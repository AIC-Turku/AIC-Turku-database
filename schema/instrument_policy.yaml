      - path: hardware.environment.co2_control
        title: CO2 control available
        status: optional
        type: boolean
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Indicates whether the system supports active CO2 regulation for live-cell imaging.

      - path: hardware.environment.co2_range
        title: CO2 control range
        status: optional
        type: string
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Documents the supported CO2 range or configured operating range when gas control is available.

      - path: hardware.environment.o2_control
        title: O2 control available
        status: optional
        type: boolean
        used_by: [audit_pdf, method_generator, dashboard]
