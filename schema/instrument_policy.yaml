version: 2
schema_id: instrument_metadata_policy
applies_to:
  template: templates/microscope_template.yaml
  instruments_glob: instruments/*.yaml
purpose:
  - drive instrument metadata completeness audits
  - define required vs conditional vs optional fields
  - provide one source of truth for validation and method-generator inclusion
  - reference controlled vocabularies without duplicating their contents

status_definitions:
  required: must be present for all instruments
  conditional: must be present when the stated condition is true
  optional: useful but not required for instrument-level reporting completeness

identity_semantics:
  manufacturer: Company/vendor/brand that makes the hardware component or module.
  model: Vendor-facing model name/designation; primary structured hardware identity field.
  product_code: Explicit catalog/order/SKU/reference code only; optional and never inferred from model or name.
  name: Local/display/instance label; not equivalent to model or product_code. Use only when it differs from model.

