      - path: hardware.triggering.primary_mode
        title: Triggering primary mode
        status: optional
        type: string
        vocab: triggering_modes
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Indicates whether synchronization is primarily hardware-triggered, software-triggered, or mixed.

      - path: hardware.triggering.notes
        title: Triggering notes
        status: optional
        type: text
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Free-text notes for synchronization, timing, or external trigger details.

  - id: canonical_light_paths_v2
    title: Canonical YAML-first light path topology
    rules:
      - path: hardware.sources
        title: Sources
        status: required
        type: list
        item_type: object
        min_items: 1
        used_by: [dashboard, method_generator]
        rationale: Canonical illumination-source inventory referenced by ordered light_paths illumination_sequence entries.

      - path: hardware.sources[].id
        title: Source ID
        status: required
        type: slug
        used_by: [dashboard, method_generator]
        rationale: Stable source identifier referenced by light_paths illumination_sequence.
        aliases: ["hardware.light_sources[].id", "hardware.light_sources[].source_id", "hardware.light_sources[].channel_name"]

      - path: hardware.sources[].name
        title: Source display name
        status: optional
        type: string
        used_by: [dashboard, method_generator]
        rationale: Optional display label for the installed source when it differs from the vendor model/designation.
        aliases: ["hardware.light_sources[].name"]

      - path: hardware.sources[].kind
        title: Source kind
        status: required
        type: string
        vocab: light_source_kinds
        used_by: [dashboard, method_generator]
        rationale: Canonical source classifier used for inventory reporting and light-path DTO generation.
        aliases: ["hardware.light_sources[].kind", "hardware.light_sources[].type"]

      - path: hardware.sources[].manufacturer
        title: Source manufacturer
        status: optional
        type: string
        used_by: [dashboard, method_generator]
        rationale: Structured provenance for installed sources.
        aliases: ["hardware.light_sources[].manufacturer"]

      - path: hardware.sources[].model
        title: Source model
        status: optional
        type: string
        used_by: [dashboard, method_generator]
        rationale: Vendor-facing source model/designation.
        aliases: ["hardware.light_sources[].model"]

      - path: hardware.sources[].product_code
        title: Source product code
        status: optional
        type: string
        used_by: [dashboard, method_generator]
        rationale: Explicit source SKU/catalog code when known.
        aliases: ["hardware.light_sources[].product_code"]

      - path: hardware.sources[].technology
        title: Source technology subtype
        status: optional
        type: string
        vocab: light_source_technologies
        used_by: [dashboard, method_generator]
        rationale: Helpful subtype metadata for lasers, LED engines, and tunable sources.
        aliases: ["hardware.light_sources[].technology"]

      - path: hardware.sources[].role
        title: Source role
        status: optional
        type: string
        vocab: light_source_roles
        used_by: [dashboard, method_generator]
        rationale: Declares the source role without relying on notes-based inference.
        aliases: ["hardware.light_sources[].role"]

      - path: hardware.sources[].timing_mode
        title: Source timing mode
        status: optional
        type: string
        vocab: light_source_timing_modes
        used_by: [dashboard, method_generator]
        rationale: Declares whether the source is continuous-wave or pulsed.
        aliases: ["hardware.light_sources[].timing_mode"]

      - path: hardware.sources[].wavelength_nm
        title: Source wavelength (nm)
        status: optional
        type: spectral_descriptor
        used_by: [dashboard, method_generator]
        rationale: Peak or representative wavelength for discrete excitation sources.
        aliases: ["hardware.light_sources[].wavelength_nm"]

      - path: hardware.sources[].width_nm
        title: Source bandwidth / FWHM (nm)
        status: optional
        type: positive_number
        used_by: [dashboard, method_generator]
        rationale: Optional spectral width for broad-spectrum or band-defined sources.
        aliases: ["hardware.light_sources[].width_nm"]

      - path: hardware.sources[].power
        title: Source nominal power
        status: optional
        type: string
        used_by: [dashboard]
        rationale: Nominal source power metadata; not experiment-level truth.
        aliases: ["hardware.light_sources[].power"]

      - path: hardware.sources[].pulse_width_ps
        title: Source pulse width (ps)
        status: conditional
        type: positive_number
        required_if:
          item_field_in:
            timing_mode: [pulsed]
        used_by: [dashboard, method_generator]
        rationale: Required when pulsed timing is declared so timing-sensitive consumers receive explicit metadata.
        aliases: ["hardware.light_sources[].pulse_width_ps"]

      - path: hardware.sources[].repetition_rate_mhz
        title: Source repetition rate (MHz)
        status: conditional
        type: positive_number
        required_if:
          item_field_in:
            timing_mode: [pulsed]
        used_by: [dashboard, method_generator]
        rationale: Required when pulsed timing is declared so timing-sensitive consumers receive explicit metadata.
        aliases: ["hardware.light_sources[].repetition_rate_mhz"]

      - path: hardware.sources[].depletion_targets_nm
        title: Source depletion target wavelengths (nm)
        status: conditional
        type: list
        item_type: positive_number
        required_if:
          item_field_in:
            role: [depletion]
        used_by: [dashboard, method_generator]
        rationale: Required when the source is used as a depletion source.
        aliases: ["hardware.light_sources[].depletion_targets_nm"]

      - path: hardware.sources[].tunable_min_nm
        title: Source tunable minimum wavelength
        status: optional
        type: positive_number
        used_by: [dashboard, method_generator]
        rationale: Lower tunable wavelength bound for tunable or white-light sources.
        aliases: ["hardware.light_sources[].tunable_min_nm"]

      - path: hardware.sources[].tunable_max_nm
        title: Source tunable maximum wavelength
        status: optional
        type: positive_number
        used_by: [dashboard, method_generator]
        rationale: Upper tunable wavelength bound for tunable or white-light sources.
        aliases: ["hardware.light_sources[].tunable_max_nm"]

      - path: hardware.sources[].simultaneous_lines_max
        title: Source simultaneous line count
        status: optional
        type: positive_number
        used_by: [dashboard, method_generator]
        rationale: Maximum simultaneously active lines for multi-line sources.
        aliases: ["hardware.light_sources[].simultaneous_lines_max"]

      - path: hardware.sources[].modalities
        title: Source modalities
        status: optional
        type: list
        item_type: string
        vocab: optical_routes
        used_by: [dashboard, method_generator]
        rationale: Validation-only route guards for installed sources. Ordered light_paths sequences remain authoritative.
        aliases: ["hardware.light_sources[].modalities", "hardware.light_sources[].path", "hardware.light_sources[].paths", "hardware.light_sources[].route", "hardware.light_sources[].routes"]

      - path: hardware.sources[].notes
        title: Source notes
        status: optional
        type: text
        used_by: [dashboard]
        rationale: Free-text source notes for operational caveats.
        aliases: ["hardware.light_sources[].notes"]

      - path: hardware.sources[].url
        title: Source URL
        status: optional
        type: url
        used_by: [dashboard]
        rationale: Reference link only.
        aliases: ["hardware.light_sources[].url"]

      - path: hardware.optical_path_elements
        title: Optical path elements
        status: optional
        type: list
        item_type: object
        used_by: [dashboard, method_generator]
        rationale: Canonical optical mechanisms/components referenced by ordered light_paths traversal sequences.

      - path: hardware.optical_path_elements[].id
        title: Optical path element ID
        status: required
        type: slug
        used_by: [dashboard, method_generator]
        rationale: Stable identifier referenced by light_paths sequences.

      - path: hardware.optical_path_elements[].name
        title: Optical path element name
        status: optional
        type: string
        used_by: [dashboard, method_generator]
        rationale: Human-readable element label for authoring clarity and consumer display.

      - path: hardware.optical_path_elements[].display_label
        title: Optical path element display label
        status: optional
        type: string
        used_by: [dashboard, method_generator]
        rationale: Optional alternate display label for UI-facing consumers.

      - path: hardware.optical_path_elements[].stage_role
        title: Optical path element stage role
        status: optional
        type: string
        vocab: optical_path_stage_roles
        used_by: [dashboard, method_generator]
        rationale: Descriptive grouping metadata for UI/runtime consumers. `light_paths` remain the sole canonical source of route topology, so stage_role should only be supplied when a stable stage grouping is genuinely useful.

      - path: hardware.optical_path_elements[].element_type
        title: Optical path element type
        status: required
        type: string
        vocab: optical_path_element_types
        used_by: [dashboard, method_generator]
        rationale: Canonical mechanism/selector/splitter type used for validator, DTO, and runtime handling.

      - path: hardware.optical_path_elements[].selection_mode
        title: Optical path element selection mode
        status: optional
        type: string
        vocab: selection_modes
        used_by: [dashboard, method_generator]
        rationale: Inventory-level selector/splitter capability metadata. Canonical route branching now lives in light_paths sequence branch blocks.

      - path: hardware.optical_path_elements[].supported_branch_modes
        title: Supported branch modes
        status: optional
        type: list
        item_type: string
        vocab: branch_modes
        used_by: [dashboard, method_generator]
        rationale: Inventory-level capability metadata describing which branch modes a selector/splitter can support.

      - path: hardware.optical_path_elements[].supported_branch_count
        title: Supported branch count
        status: optional
        type: positive_number
        used_by: [dashboard, method_generator]
        rationale: Inventory-level capability metadata describing how many branches a selector/splitter can support.

      - path: hardware.optical_path_elements[].modalities
        title: Optical path element modalities
        status: optional
        type: list
        item_type: string
        vocab: optical_routes
        used_by: [dashboard, method_generator]
        rationale: Validation-only route guards for optical path elements. Ordered light_paths sequences remain authoritative.

      - path: hardware.optical_path_elements[].positions
        title: Optical path element positions
        status: optional
        type: object
        example_key: Pos_1
        used_by: [dashboard, method_generator]
        rationale: Position map for installed filter wheels, turrets, sliders, or cubes.

      - path: hardware.optical_path_elements[].positions{}.component_type
        title: Optical path position component type
        status: optional
        type: string
        vocab: optical_component_types
        used_by: [dashboard, method_generator]
        rationale: Canonical optical component classifier for direct position payloads.

      - path: hardware.optical_path_elements[].positions{}.manufacturer
        title: Optical path position manufacturer
        status: optional
        type: string
        used_by: [dashboard, method_generator]
        rationale: Structured provenance for direct position payloads.

      - path: hardware.optical_path_elements[].positions{}.model
        title: Optical path position model
        status: optional
        type: string
        used_by: [dashboard, method_generator]
        rationale: Vendor-facing model/designation for direct position payloads.

      - path: hardware.optical_path_elements[].positions{}.product_code
        title: Optical path position product code
        status: optional
        type: string
        used_by: [dashboard, method_generator]
        rationale: Explicit catalog/SKU/reference code for direct position payloads when known.

      - path: hardware.optical_path_elements[].positions{}.bands
        title: Optical path position multiband array
        status: optional
        type: list
        item_type: object
        used_by: [dashboard, method_generator]
        rationale: Explicit multiband pass windows for direct position payloads.

      - path: hardware.optical_path_elements[].positions{}.bands[].center_nm
        title: Optical path position band center (nm)
        status: conditional
        type: positive_number
        required_if:
          parent_present: hardware.optical_path_elements[].positions{}.bands[]
        used_by: [dashboard, method_generator]
        rationale: Band center for direct multiband position payloads.

      - path: hardware.optical_path_elements[].positions{}.bands[].width_nm
        title: Optical path position band width (nm)
        status: conditional
        type: positive_number
        required_if:
          parent_present: hardware.optical_path_elements[].positions{}.bands[]
        used_by: [dashboard, method_generator]
        rationale: Band width for direct multiband position payloads.

      - path: hardware.eyepieces
        title: Eyepieces
        status: optional
        type: list
        item_type: object
        used_by: [dashboard, method_generator]
        rationale: Explicit terminal eyepieces addressed directly by light path routing.

      - path: hardware.eyepieces[].id
        title: Eyepiece ID
        status: conditional
        type: string
        required_if:
          parent_present: "hardware.eyepieces[]"
        used_by: [dashboard, method_generator]
        rationale: Stable identifier referenced by light_paths.

      - path: hardware.eyepieces[].magnification
        title: Eyepiece magnification
        status: optional
        type: positive_number
        used_by: [dashboard, method_generator]
        rationale: Optional magnification value for the eyepiece.

      - path: hardware.eyepieces[].field_number
        title: Eyepiece field number
        status: optional
        type: positive_number
        used_by: [dashboard, method_generator]
        rationale: Optional field number value for the eyepiece.

      - path: hardware.eyepieces[].notes
        title: Eyepiece notes
        status: optional
        type: text
        used_by: [dashboard, method_generator]
        rationale: Useful for documenting eyepiece-specific caveats or labels.

      - path: hardware.endpoints
        title: Explicit detection endpoints
        status: optional
        type: list
        item_type: object
        used_by: [dashboard, method_generator]
        rationale: Optional explicit endpoint inventory; canonical normalization merges these rows with endpoint-capable inventories into the unified endpoint registry.

      - path: hardware.endpoints[].id
        title: Explicit endpoint ID
        status: conditional
        type: slug
        required_if:
          parent_present: "hardware.endpoints[]"
        used_by: [dashboard, method_generator]
        rationale: Stable identifier for the explicit endpoint row.

      - path: hardware.endpoints[].endpoint_type
        title: Explicit endpoint type
        status: conditional
        type: string
        vocab: endpoint_types
        required_if:
          parent_present: "hardware.endpoints[]"
        used_by: [dashboard, method_generator]
        rationale: Canonical endpoint classifier for an explicit endpoint row.

      - path: hardware.detectors[].collection_min_nm
        title: Detector collection minimum wavelength
        status: optional
        type: positive_number
        used_by: [dashboard, method_generator]
        rationale: Lower detector collection bound for spectral simulation.

      - path: hardware.detectors[].collection_max_nm
        title: Detector collection maximum wavelength
        status: optional
        type: positive_number
        used_by: [dashboard, method_generator]
        rationale: Upper detector collection bound for spectral simulation.

      - path: hardware.detectors[].collection_center_nm
        title: Detector collection center wavelength
        status: optional
        type: positive_number
        used_by: [dashboard, method_generator]
        rationale: Detector collection center for derived passband modeling.

      - path: hardware.detectors[].collection_width_nm
        title: Detector collection width
        status: optional
        type: positive_number
        used_by: [dashboard, method_generator]
        rationale: Detector collection bandwidth for derived passband modeling.

      - path: light_paths
        title: Light paths
        status: required
        type: list
        item_type: object
        min_items: 1
        used_by: [dashboard, method_generator]
        rationale: Canonical ordered YAML-first traversal definitions. These sequences are the authoritative topology contract.

      - path: light_paths[].id
        title: Light path ID
        status: required
        type: slug
        used_by: [dashboard, method_generator]
        rationale: Stable route identifier used by simulator, UI, and graph rendering.

      - path: light_paths[].name
        title: Light path name
        status: required
        type: string
        used_by: [dashboard, method_generator]
