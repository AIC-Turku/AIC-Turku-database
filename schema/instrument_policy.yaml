      - path: hardware.environment.o2_range
        title: O2 control range
        status: optional
        type: string
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Documents the supported O2 range or configured operating range when oxygen control is available.

      - path: hardware.environment.humidity_control
        title: Humidity control available
        status: optional
        type: boolean
        used_by: [audit_pdf, method_generator, dashboard]
