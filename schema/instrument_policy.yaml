sections:
  - id: general_identity
    title: General instrument identity
    rules:
      - path: instrument.display_name
        title: Display name
        status: required
        type: string
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Primary human-readable instrument name shown in reports and methods output.

      - path: instrument.instrument_id
        title: Instrument ID
        status: required
        type: slug
        validation:
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
        used_by: [audit_pdf, method_generator, dashboard, qc_mapping, maintenance]
        rationale: Stable machine-readable key used across QC, maintenance, and dashboard routing.

      - path: instrument.manufacturer
        title: Manufacturer
        status: required
        type: string
        vocab: null
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Company/vendor/brand that makes the instrument.

      - path: instrument.model
        title: Model
        status: required
        type: string
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Vendor-facing model designation used as the primary structured identity field for the instrument; do not substitute display names or catalog codes.

      - path: instrument.year_of_purchase
        title: Year of purchase
        status: optional
        type: year_or_empty
        used_by: [audit_pdf, dashboard]
        rationale: Operational context and lifecycle planning; not essential for methods completeness.

      - path: instrument.funding
        title: Funding
        status: optional
        type: string
        used_by: [audit_pdf, dashboard]
        rationale: Operational and acknowledgement context; not required for methods reporting.

      - path: instrument.stand_orientation
        title: Stand orientation
        status: required
        type: string
        vocab: stand_orientations
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Used directly by methods generator and helps classify the platform.

      - path: instrument.ocular_availability
        title: Ocular availability
        status: required
        type: string
        vocab: ocular_availability
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Critical user-experience metadata. Distinguishes traditional stands from box microscopes.

      - path: instrument.location
        title: Location
        status: required
        type: string
        used_by: [audit_pdf, dashboard]
        rationale: required for operational metadata; not necessary for methods text.

      - path: instrument.notes
        title: Notes
        status: optional
        type: text
        used_by: [audit_pdf, dashboard]
        rationale: Free text is useful for staff but should not replace structured fields.

      - path: instrument.url
        title: Instrument URL
        status: optional
        type: url
        used_by: [audit_pdf, dashboard]
        rationale: Helpful for staff lookup and manuals, not essential for methods completeness.

      - path: modalities
        title: Imaging modalities
        status: required
        type: list
        item_type: string
        min_items: 1
        vocab: modalities
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Core reporting category in QUAREP/JCB-style instrumentation metadata.

      - path: modules
        title: Installed modules
        status: optional
        type: list
        item_type: object
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Only present when installed modules materially change imaging capabilities.

      - path: modules[].type
        title: Module type
        status: conditional
        type: string
        vocab: modules
        aliases: ["modules[].name"]
        required_if:
          parent_present: "modules[]"
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Canonical module classifier used for structured capability reporting.

      - path: modules[].name
        title: Module display name (legacy)
        status: optional
        type: string
        superseded_by: modules[].type
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Legacy/local display label. Prefer modules[].type for canonical module identity.

      - path: modules[].notes
        title: Module notes
        status: optional
        type: text
        used_by: [audit_pdf, dashboard]
        rationale: Useful for operational nuances and limitations.

      - path: modules[].url
        title: Module URL
        status: optional
        type: url
        used_by: [audit_pdf, dashboard]
        rationale: Helpful vendor or manual reference.

      - path: modules[].manufacturer
        title: Module manufacturer
        status: conditional
        type: string
        required_if:
          parent_present: "modules[]"
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Vendor-facing module model/designation used as primary structured identity for the installed module.

      - path: modules[].model
        title: Module model
        status: conditional
        type: string
        required_if:
          parent_present: "modules[]"
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Vendor-facing module model/designation used as primary structured identity for the installed module.

  - id: software
    title: Software
    rules:
      - path: software[]
        title: Software entries
        status: optional
        type: list
        item_type: object
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Software is represented as extensible role-tagged entries.

      - path: software[].role
        title: Software role
        status: conditional
        type: string
        vocab: software_roles
        required_if:
          parent_present: "software[]"
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Role tags define how software entries are interpreted in methods text and audits.

      - path: software[].name
        title: Software name
        status: conditional
        type: string
        required_if:
          parent_present: "software[]"
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Required for each declared software entry.

      - path: software[].version
        title: Software version
        status: conditional
        type: string_or_empty
        required_if:
          parent_present: "software[]"
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Version is required (empty allowed) for reproducibility-aware software metadata.

      - path: software[].developer
        title: Software developer
        status: optional
        type: string
        used_by: [audit_pdf, dashboard]
        rationale: Helpful provenance metadata for software vendors/developers.

      - path: software[].notes
        title: Software notes
        status: optional
        type: text
        used_by: [audit_pdf, dashboard]
        rationale: Useful for workflow caveats and role-specific implementation notes.

      - path: software[].url
        title: Software URL
        status: optional
        type: url
        used_by: [audit_pdf, dashboard]
        rationale: Reference link to vendor pages or manuals.

  - id: scanner
    title: Scanner
    rules:
      - path: hardware.scanner.type
        title: Scanner type
        status: required
        type: string
        vocab: scanner_types
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Core hardware discriminator for methods completeness.

      - path: hardware.scanner.line_rate_hz
        title: Scanner line rate (Hz)
        status: conditional
        type: positive_number
        required_if:
          scanner_type_in: [resonant, polygon, acousto_optic, tandem]
        used_by: [audit_pdf, method_generator]
        rationale: Required where speed mode is intrinsic and relevant to the scan engine.

      - path: hardware.scanner.pinhole_um
        title: Pinhole diameter (um)
        status: conditional
        type: positive_number
        required_if:
          scanner_type_in: [spinning_disk]
        used_by: [audit_pdf, method_generator]
        rationale: Required for spinning disk systems where pinhole size is fixed in hardware. Point scanners use tunable pinholes defined per-experiment.

      - path: hardware.scanner.light_sheet_type
        title: Light Sheet Architecture
        status: conditional
        type: string
        vocab: light_sheet_types
        required_if:
          modalities_any_of: [light_sheet]
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Clarifies the specific illumination geometry for light sheet systems.

      - path: hardware.scanner.notes
        title: Scanner notes
        status: optional
        type: text
        used_by: [audit_pdf, dashboard]
        rationale: Useful for mode-specific caveats.

      - path: hardware.scanner.url
        title: Scanner URL
        status: optional
        type: url
        used_by: [audit_pdf, dashboard]
        rationale: Reference only.

  - id: detectors
    title: Detectors
    rules:
      - path: hardware.detectors
        title: Detectors
        status: optional
        type: list
        item_type: object
        min_items: 1
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Optional to support purely manual microscopes; include at least one detector chain when digital detection is present.

      - path: hardware.detectors[].id
        title: Detector ID
        status: conditional
        type: string
        required_if:
          parent_present: "hardware.detectors[]"
        used_by: [dashboard]
        rationale: Stable graph target ID for light path routing, virtual microscope traversal, and splitter branch targets.

      - path: hardware.detectors[].kind
        title: Detector kind
        status: conditional
        type: string
        vocab: detector_kinds
        required_if:
          parent_present: "hardware.detectors[]"
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Core detector class.

      - path: hardware.detectors[].manufacturer
        title: Detector manufacturer
        status: conditional
        type: string
        required_if:
          parent_present: "hardware.detectors[]"
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Needed for hardware identification.

      - path: hardware.detectors[].model
        title: Detector model
        status: conditional
        type: string
        required_if:
          parent_present: "hardware.detectors[]"
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Needed for hardware identification.

      - path: hardware.detectors[].pixel_pitch_um
        title: Detector pixel pitch (um)
        status: conditional
        type: positive_number
        aliases: ["hardware.detectors[].pixel_size_um"]
        required_if:
          item_kind_in: [scmos, cmos, emccd, ccd]
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Required for camera-based detectors because reporting completeness depends on it.

      - path: hardware.detectors[].pixel_size_um
        title: Detector pixel size (legacy alias)
        status: optional
        type: positive_number
        superseded_by: hardware.detectors[].pixel_pitch_um
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Backward-compatible alias retained for existing files; normalize to pixel_pitch_um when possible.

      - path: hardware.detectors[].sensor_format_px
        title: Detector sensor format (px)
        status: optional
        type: string
        used_by: [audit_pdf, dashboard]
        rationale: Useful capability metadata, not minimal.

      - path: hardware.detectors[].binning
        title: Detector binning
        status: optional
        type: string
        used_by: [audit_pdf, dashboard]
        rationale: Usually acquisition-specific rather than fixed hardware metadata.

      - path: hardware.detectors[].bit_depth
        title: Detector bit depth
        status: optional
        type: positive_number
        used_by: [audit_pdf, dashboard]
        rationale: Capability metadata; useful but not minimal.

      - path: hardware.detectors[].qe_peak_pct
        title: Detector peak quantum efficiency (%)
        status: conditional
        type: positive_number
        required_if:
          modalities_any_of: [confocal_point, confocal_spinning_disk, ism]
        used_by: [audit_pdf, dashboard]
        rationale: Capability metadata.

      - path: hardware.detectors[].read_noise_e
        title: Detector read noise (e-)
        status: optional
        type: positive_number
        used_by: [audit_pdf, dashboard]
        rationale: Capability metadata.

      - path: hardware.detectors[].notes
        title: Detector notes
        status: optional
        type: text
        used_by: [audit_pdf, dashboard]
        rationale: Useful for channel assignments or operating modes.

      - path: hardware.detectors[].supports_time_gating
        title: Detector supports time gating
        status: optional
        type: boolean
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Instrument-level capability flag indicating whether detector time-gating is available.

      - path: hardware.detectors[].default_gating_delay_ns
        title: Detector default gating delay (ns)
        status: conditional
        type: positive_number
        required_if:
          item_field_in:
            supports_time_gating: [true]
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Facility default detector gating delay setting used for instrument characterization, not experiment truth.

      - path: hardware.detectors[].default_gate_width_ns
        title: Detector default gate width (ns)
        status: conditional
        type: positive_number
        required_if:
          item_field_in:
            supports_time_gating: [true]
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Facility default detector gate width setting used for instrument characterization, not experiment truth.

      - path: hardware.detectors[].collection_min_nm
        title: Detector collection window minimum wavelength (nm)
        status: optional
        type: positive_number
        aliases: ["hardware.detectors[].min_nm"]
        used_by: [dashboard]
        rationale: Explicit lower bound of detector collection window for virtual microscope response modeling.

      - path: hardware.detectors[].collection_max_nm
        title: Detector collection window maximum wavelength (nm)
        status: optional
        type: positive_number
        aliases: ["hardware.detectors[].max_nm"]
        used_by: [dashboard]
        rationale: Explicit upper bound of detector collection window for virtual microscope response modeling.

      - path: hardware.detectors[].collection_center_nm
        title: Detector collection window center wavelength (nm)
        status: optional
        type: positive_number
        aliases: ["hardware.detectors[].channel_center_nm"]
        used_by: [dashboard]
        rationale: Collection center wavelength used to derive detector passband when min/max are not supplied.

      - path: hardware.detectors[].collection_width_nm
        title: Detector collection window width (nm)
        status: optional
        type: positive_number
        aliases: ["hardware.detectors[].bandwidth_nm"]
        used_by: [dashboard]
        rationale: Collection bandwidth used with collection_center_nm to derive detector passband.

      - path: hardware.detectors[].channel_center_nm
        title: Detector channel center wavelength (nm, legacy alias)
        status: optional
        type: positive_number
        superseded_by: hardware.detectors[].collection_center_nm
        used_by: [dashboard]
        rationale: Deprecated alias retained for compatibility; prefer collection_center_nm.

      - path: hardware.detectors[].bandwidth_nm
        title: Detector bandwidth (nm, legacy alias)
        status: optional
        type: positive_number
        superseded_by: hardware.detectors[].collection_width_nm
        used_by: [dashboard]
        rationale: Deprecated alias retained for compatibility; prefer collection_width_nm.

      - path: hardware.detectors[].min_nm
        title: Detector minimum wavelength (nm, legacy alias)
        status: optional
        type: positive_number
        superseded_by: hardware.detectors[].collection_min_nm
        used_by: [dashboard]
        rationale: Deprecated alias retained for compatibility; prefer collection_min_nm.

      - path: hardware.detectors[].max_nm
        title: Detector maximum wavelength (nm, legacy alias)
        status: optional
        type: positive_number
        superseded_by: hardware.detectors[].collection_max_nm
        used_by: [dashboard]
        rationale: Deprecated alias retained for compatibility; prefer collection_max_nm.

      - path: hardware.detectors[].url
        title: Detector URL
        status: optional
        type: url
        used_by: [audit_pdf, dashboard]
        rationale: Reference only.

  - id: optical_modulators
    title: Optical modulators
    rules:
      - path: hardware.optical_modulators
        title: Optical modulators
        status: optional
        type: list
        item_type: object
        min_items: 1
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Optional inventory of phase and beam-shaping devices used by STED or adaptive illumination workflows.

      - path: hardware.optical_modulators[].type
        title: Optical modulator type
        status: conditional
        type: string
        vocab: optical_modulator_types
        required_if:
          parent_present: "hardware.optical_modulators[]"
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Structured classification of installed optical modulator hardware.

      - path: hardware.optical_modulators[].manufacturer
        title: Optical modulator manufacturer
        status: conditional
        type: string
        required_if:
          parent_present: "hardware.optical_modulators[]"
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Required for reproducible hardware provenance when an optical modulator is listed.

      - path: hardware.optical_modulators[].model
        title: Optical modulator model
        status: conditional
        type: string
        required_if:
          parent_present: "hardware.optical_modulators[]"
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Required for reproducible hardware provenance when an optical modulator is listed.

      - path: hardware.optical_modulators[].supported_phase_masks
        title: Supported phase masks
        status: optional
        type: list
        vocab: phase_mask_types
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Declares supported phase mask classes for depletion beam shaping.

      - path: hardware.optical_modulators[].notes
        title: Optical modulator notes
        status: optional
        type: text
        used_by: [audit_pdf, dashboard]
        rationale: Additional implementation notes for modulator integration.

  - id: illumination_logic
    title: Illumination logic
    rules:
      - path: hardware.illumination_logic
        title: Illumination logic entries
        status: optional
        type: list
        item_type: object
        min_items: 1
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Optional list of structured adaptive or conditional illumination logic supported by the instrument.

      - path: hardware.illumination_logic[].method
        title: Illumination logic method
        status: conditional
        type: string
        vocab: adaptive_illumination_methods
        required_if:
          parent_present: "hardware.illumination_logic[]"
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Structured adaptive illumination method identifier.

      - path: hardware.illumination_logic[].default_enabled
        title: Illumination logic default enabled
        status: conditional
        type: boolean
