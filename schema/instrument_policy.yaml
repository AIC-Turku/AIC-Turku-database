      - path: hardware.stages
        title: Stages and focus drives
        status: conditional
        type: list
        item_type: object
        required_if:
          any_of:
            - modules_any_of: [motorized_stage]
            - modules_any_of: [piezo_z_stage]
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Present when motorized or specialized stage and focus hardware is documented.

      - path: hardware.stages[].type
        title: Stage or focus drive type
        status: conditional
        type: string
        vocab: stage_types
        required_if:
          any_of:
            - modules_any_of: [motorized_stage]
            - modules_any_of: [piezo_z_stage]
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Classifies the stage or focus-drive hardware that is installed.

      - path: hardware.stages[].manufacturer
        title: Stage manufacturer
        status: optional
        type: string
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Helps identify the installed stage or focus-drive hardware.

      - path: hardware.stages[].model
        title: Stage model
        status: optional
        type: string
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Helps identify the installed stage or focus-drive hardware.

      - path: hardware.stages[].step_size_um
        title: Stage step size (um)
        status: optional
        type: positive_number
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Useful capability metadata for motorized stage or focus-drive hardware.

      - path: hardware.hardware_autofocus.is_installed
        title: Hardware autofocus installed
        status: optional
        type: boolean
        used_by: [audit_pdf, method_generator, dashboard]
        rationale: Indicates whether a hardware autofocus system is currently installed.

      - path: hardware.hardware_autofocus.type
        title: Hardware autofocus type
        status: conditional
        type: string
        vocab: autofocus_types
        required_if:
          modules_any_of: [hardware_autofocus]
