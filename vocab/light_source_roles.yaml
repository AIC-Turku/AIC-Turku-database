terms:
  - id: excitation
    label: "Excitation"
    description: "Primary fluorophore excitation source."
    synonyms: ["excitation_laser"]
  - id: depletion
    label: "Depletion"
    description: "STED depletion source used for stimulated emission depletion."
    synonyms: ["sted_depletion", "sted"]
  - id: activation
    label: "Activation"
    description: "Photoactivation or photoswitching source."
  - id: alignment
    label: "Alignment"
    description: "Alignment or service beam not used as primary excitation/depletion."
  - id: transmitted_illumination
    label: "Transmitted Illumination"
    description: "Diascopic or transmitted-light illumination source used for brightfield, phase contrast, darkfield, or DIC."
    synonyms: ["transmitted", "brightfield", "diascopic", "dia"]

  - id: reflected_illumination
    label: "Reflected Illumination"
    description: "Source provides reflected-light illumination onto the sample from the objective or an epi/top-light path."
    synonyms: ["epi illumination", "incident illumination"]
