terms:
  - id: sample_plane
    label: "Sample Plane"
    description: "Measured at the focal plane, for example just above the objective where illumination reaches the sample."

  - id: back_aperture
    label: "Back Aperture"
    description: "Measured at the objective back aperture, typically with the objective removed to access the aperture position."

  - id: fiber_output
    label: "Fiber Output"
    description: "Measured directly at the output of the optical fiber before light enters downstream optics."

  - id: laser_head
    label: "Laser Head"
    description: "Measured directly at the exit window of the laser head at the source."

  - id: internal_sensor
    label: "Internal Sensor"
    description: "Read from the system's internal diagnostic sensor rather than an external power meter."

  - id: other
    label: "Other"
    description: "Other measurement position not listed above; specify the exact location in details."
