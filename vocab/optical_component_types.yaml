terms:
  - id: bandpass
    label: "Bandpass"
    description: "Requires center_nm and width_nm."

  - id: multiband_bandpass
    label: "Multiband Bandpass"
    description: "Bandpass component containing multiple pass bands."

  - id: longpass
    label: "Longpass"
    description: "Requires cut_on_nm."

  - id: shortpass
    label: "Shortpass"
    description: "Requires cut_off_nm."

  - id: dichroic
    label: "Dichroic"
    description: "Requires cutoffs_nm array."

  - id: multiband_dichroic
    label: "Multiband Dichroic"
    description: "Requires cutoffs_nm array."

  - id: polychroic
    label: "Polychroic"
    description: "Synonym for multiband."

  - id: notch
    label: "Notch"
    description: "Requires center_nm and width_nm."

  - id: filter_cube
    label: "Filter Cube"
    description: "Linked excitation/dichroic/emission cube or filter-set assembly installed as a single selectable position. Supports explicit excitation_filter, dichroic, and emission_filter sub-component objects for authoritative spectral authoring."

  - id: analyzer
    label: "Analyzer"
    description: "Polarization analyzer element used in DIC or polarized-light detection paths."

  - id: empty
    label: "Empty"
    description: "An explicitly empty slot."

  - id: mirror
    label: "Mirror"
    description: "A 100% reflective surface."

  - id: block
    label: "Block"
    description: "A 100% blocking/shutter position."
  - id: passthrough
    label: "Passthrough"
    description: "Explicit slot that does not materially alter spectral routing."

  - id: neutral_density
    label: "Neutral Density"
    description: "Broadband neutral-density attenuator. Spectral shape is preserved even if total intensity is reduced."
