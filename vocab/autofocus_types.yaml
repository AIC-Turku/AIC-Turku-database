terms:
  - id: infrared_reflection
    label: "Infrared Reflection Autofocus"
    description: "Hardware autofocus based on infrared reflection from the coverslip or sample interface to compensate focus drift."
    synonyms: ["PFS", "perfect focus", "Nikon Perfect Focus", "Nikon Perfect Focus System", "Definite Focus", "Zeiss Definite Focus", "Leica AFC", "Olympus ZDC"]
  - id: contrast_based
    label: "Contrast-Based Autofocus"
    description: "Autofocus that optimizes image sharpness or contrast directly from the captured image signal."
    synonyms: ["image-based autofocus", "software autofocus", "focus metric"]
  - id: laser_reflection
    label: "Laser Reflection Autofocus"
    description: "Hardware autofocus that uses reflected laser light to maintain focal position during imaging."
    synonyms: ["reflection autofocus", "hardware focus lock"]
  - id: capacitance_based
    label: "Capacitance-Based Autofocus"
    description: "Autofocus using capacitive sensing to track objective-to-sample distance and stabilize focus."
    synonyms: ["capacitive autofocus"]
  - id: other
    label: "Other"
    description: "Hardware autofocus implementation not covered by the predefined terms."
    synonyms: ["custom", "misc"]
