terms:
  - id: nikon_perfect_focus
    label: "Nikon Perfect Focus System"
    description: "Nikon hardware autofocus system that compensates for focus drift during imaging."
    synonyms: ["PFS", "perfect focus"]
  - id: zeiss_definite_focus
    label: "Zeiss Definite Focus"
    description: "Zeiss hardware autofocus system for maintaining focal position over time."
    synonyms: ["definite focus", "Definite Focus"]
  - id: leica_afc
    label: "Leica AFC"
    description: "Leica adaptive focus control hardware autofocus system."
    synonyms: ["AFC", "adaptive focus control"]
  - id: olympus_zdc
    label: "Olympus ZDC"
    description: "Olympus zero drift compensation hardware autofocus system."
    synonyms: ["ZDC", "zero drift compensation"]
  - id: other
    label: "Other"
    description: "Hardware autofocus implementation not covered by the predefined terms."
    synonyms: ["custom", "misc"]
