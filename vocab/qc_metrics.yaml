terms:
  - id: psf_fwhm_x
    label: "PSF FWHM X"
    description: "Full width at half maximum of the point spread function along the X axis, reported in micrometers (um)."
  - id: psf_fwhm_y
    label: "PSF FWHM Y"
    description: "Full width at half maximum of the point spread function along the Y axis, reported in micrometers (um)."
  - id: psf_fwhm_z
    label: "PSF FWHM Z"
    description: "Full width at half maximum of the point spread function along the Z axis, reported in micrometers (um)."
  - id: psf_signal_to_noise
    label: "PSF Signal-to-Noise Ratio"
    description: "Signal-to-noise ratio measured for the QC bead used in point spread function analysis."
  - id: chromatic_shift_x
    label: "Chromatic Shift X"
    description: "Lateral chromatic shift in the X direction relative to a reference channel, reported in micrometers (um)."
  - id: chromatic_shift_y
    label: "Chromatic Shift Y"
    description: "Lateral chromatic shift in the Y direction relative to a reference channel, reported in micrometers (um)."
  - id: chromatic_shift_z
    label: "Chromatic Shift Z"
    description: "Axial chromatic shift in the Z direction relative to a reference channel, reported in micrometers (um)."
  - id: stage_error_x
    label: "Stage Error X"
    description: "Maximum stage positioning error in the X direction, reported in micrometers (um)."
  - id: stage_error_y
    label: "Stage Error Y"
    description: "Maximum stage positioning error in the Y direction, reported in micrometers (um)."
  - id: stage_error_z
    label: "Stage Error Z"
    description: "Maximum stage positioning error in the Z direction, reported in micrometers (um)."
  - id: psf.60x_oil.525.fwhm_z_nm
    label: "PSF 60x Oil 525 FWHM Z (nm)"
    description: "Axial full width at half maximum for the 60x oil objective in the 525 nm channel, reported in nanometers."
