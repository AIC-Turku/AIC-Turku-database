terms:
  - id: long_working_distance
    label: "Long Working Distance"
    description: "Objective designed for increased working distance."
    synonyms:
      - LWD
      - ELWD
      - ELWD ADM
  - id: coverslip_correction
    label: "Coverslip Correction"
