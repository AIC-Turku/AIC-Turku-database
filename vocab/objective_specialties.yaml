      - phase contrast (ext ph4)
      - phase contrast (ph1)
      - phase compatible
  - id: dic
    label: "DIC"
    description: "Objective supports differential interference contrast."
    synonyms:
      - DIC
      - DIC (Suitable)
      - DIC (Recommended)
      - dic compatible
      - DIC N1
      - DIC N1 (Suitable)
      - DIC N2
      - DIC N2 (Suitable)
      - DIC N2 (Recommended)
      - DIC Prism A
      - DIC Prism B
      - DIC Prism C
      - DIC Prism D
      - DIC Prism E
